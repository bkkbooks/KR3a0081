body:
  text: 居業録卷二明胡居仁撰學問第二聖學以敬為本者敬可以去昏惰正邪僻除雜亂立大本聖賢工夫雖多莫切要如敬字敬有自畏愼底意思敬有肅然自整頓底意思敬有卓然精明底意思敬有湛然純一底意思故聖學就此做根本凡事都靠著此做去存養省察皆由此古今聖賢説敬字曰欽曰寅曰恭曰畏曰翼曰戒懼曰戰兢曰齋莊字雖不同其實一也洪範貌曰恭是外面之敬也至曰恭作肅則心亦敬也內外一致也臨深淵履薄氷形容戒懼之意最切孔子言出門如見大賓使民如承大祭又畫出一箇敬底樣子出來與人做程子言整齊嚴肅是入敬處朱子曰畏字是敬之正意程子主一無適是就存主處説謝氏惺惺法是就敬之精明處説尹氏收斂身心不容毫髮事又以人到神祠致敬為喻即是孔子見大賓承大祭之意形容得最親切朱子敬齋針説得全備毫釐有差便流于禪定故朱子有三綱淪九法斁之戒程朱開聖學門庭只主敬窮理便教學者有入處程子曰操約者敬而已又曰約敬是也蓋人若敬時許多放蕩底心都收了許多雜擾底心都一了萬事萬物之理都在吾身上非約而何程子曰若不能涵養只是説話言人不能操守涵養則所講究之理無以有諸己適為口語而已蓋能主敬涵養則天理本原在內聰明自生義理日明所窮之理得於己而不失故朱子以為未知者敬以知之己知者敬以守之此涵養之敬所以成始成終也敬為存養之道貫徹始終所謂涵養須用敬進學則在致知是未知之前先須存養此心方能致知又謂識得此理以誠敬存之而已則致知之後又要存養方能不失蓋致知之功有時存養之功不息敬便是操非敬之外别有箇操存工夫格物便是致知非格物之外别有箇致知工夫主敬只是要得此心專一專則內直中自有主有主則事物之來便能照察斷制主敬是有意以心言也行其所無事以理言也心有所存主故有意循其理之所當然故無事此有中未嘗有無中未嘗無心與理一也真能主敬自無雜慮欲屏思慮者皆是敬不至也主一工夫可漸至純一不已主一主是專主之主一是一于此而不他適純一不雜之一初學難得如此故程子只教整齊嚴肅則心便一戒愼恐懼是間邪工夫才戒愼恐懼心便一常戒愼恐懼則心常一常整齊嚴肅則心常一此等工夫交來交去只一般只是要此心常在這裡敬如何便存得天理蓋心中只是理别無物放其心理便失敬則心存理便在主敬不是便有一敬將心去主他只心自敬耳主敬是專要如此而不問也居敬持敬亦是如此聖人也是專一於敬無箇不敬聖人曰欽明曰溫恭曰聖敬曰敬止是他自然不離於敬不説主敬與持敬若主敬熟後以至不待著意便是聖人故程子曰主一則有意在然則溫恭是不用戒愼恐懼整齊嚴肅否看來聖人是自然戒愼恐懼自然整齊嚴肅如曰夔夔齋栗曰齋戒以神明其德是也人雖持敬亦要理義來浸灌方得此心悅懌不然只是硬持守也正容體整威儀便是立敬之規模主一無適是心地上事內外交正持養之要道也敬者德之聚也敬則衆善畢集不敬則怠惰放僻遂至於德敗也恭敬則非特心存又且明瀅蓋心是神明之舍存則自明只致其恭敬則心肅然自存非是捉住一箇心來存放這裡讀書論事皆推究到底即是窮理非是懸空尋得一箇理來看莊敬是保飬身心底工夫一整齊嚴肅心便在是自能整理才寬慢則心便悠蕩無歸著是自不能整理也端莊整肅嚴威儼恪是敬之入頭處提撕喚醒是敬之接續處主一無適湛然純一是敬之無間斷處惺惺不昧精明不亂敬之效驗處收放心只是一箇敬不主敬而欲收放心東追西捉愈見費力縱使捉得住亦是箇死物事其虛靈不昧所以具衆理應萬物者俱不能矣惟整齊嚴肅主一無適則隨動隨靜自然收斂不放心既不放則內有主自然神明不測體用不虧此釋老之學空寂無用儒者之學所以通達萬變也覺得心放亦是好事便提撕收斂再不令走便是主敬存心工夫若心不知下落茫茫蕩蕩是何工夫今人説靜時不可操才操便是動學之不講乃至於此甚可懼也靜時不操待何時去操其意以為不要惹動此心待他自存若操便要著意著意便不得靜是欲以空寂杳冥為靜不知所謂靜者只是以思慮未萌事物未至而言其中操持之意常在也若不操持待其自存決無此理程子曰人心自由便放去又以思慮紛擾為不靜遂遏絶思慮以為靜殊不知君子九思亦是存養法但要專一以專一時自無雜慮有事時專一無事時亦專一此敬之所以貫乎動靜為操存之要法也或者疑朱子言敬者一心之主宰為非以為心能主敬豈敬能主心曰固是心去主敬敬却能做心之主也心若不敬即放能敬即存非心之主而何問釋氏默坐澄心亦是敬也何以心反無主曰似是而非他只默坐澄心是死法敬則該貫動靜是活法如居處恭執事敬以至動容周旋皆敬之事能如此則中自有主又不合他死殺要澄取此心亦是助長以其默坐澄心之久雖似見得有箇光明意思亦非真心所以無主也敬該動靜靜坐端嚴敬也隨事檢點致謹亦敬也敬兼內外容貌莊正敬也心地湛然純一敬也靜中萬理具備是涵得有動之理故謂之體動時事得其理是著乎靜之理故謂之用體用只是一物以其在靜在動未發已發而言也未發之前要操得密已發之後要察得精程子曰未應不是前已應不是後蓋未應之時此理全具於寂然不動之中當此之時敬以操存之而未發之中天下之大本立焉已應之時此理發見于感而遂通之際當此之時敬以省察之則發而中節之和而天下之達道行焉未應體也靜也已應動也用也體即用所存用即體所發非有兩事固無先後可言亦動靜無端隂陽無始之意持敬而無間斷則誠矣故程子曰未能誠者由敬以入誠誠敬雖是二事其實一體非敬無以入誠非誠則敬有間斷敬是持守之法實有是敬而無間即誠也程子曰識得此理以誠敬存之而已誠哉是言也若不誠敬道理便把捉不住四書六經皆是吾身上有底道理但聖賢先我而覺耳我未覺所以要讀若不反躬則皆成糟粕因聖賢之書以修身修身則聖賢之言愈有著落今更有聖賢出其説不過于大學論孟中庸此後書莫過於小學近思録學者能于此處真知實踐他書不讀無憾也在小學近思録四書上做得工夫真異端功利俱害不得近思録一書小學大學工夫盡有入頭處最怕差將後無救處入頭處亦怕偏將來偏到底要從小學近思録大學論語入則路頭正矣今人才氣高者便入異端去自小學之教不行學者無基本大學之教不行無進步處皆以虛靜存心懸空求道故有此病古人存心之法具於小學入道之門由于大學學者當以小學四書近思録熟讀體驗有所得然後方可博觀古今經是史之尺度斷例史是經之應驗事為經純史雜故經不明不可看史今人有厭讀朱子傳注以為太煩者又有博覽朱子諸書以資解説者二者皆非也憚其煩厭其卑此好簡易高大必流於異學空虛昔陸子靜惡伊川之言蓋其天資過於高大有凌空駕虛之病與程子收斂謹密實地工夫異矣況朱子博學精詳細密纎悉尤非趨簡徑樂間曠者所便也讀書須著實理會做入書內裡去皮膚上綽過不濟事穿破一兩處逐旋透入去做得五七處透徹後處處透得去蓋義理根源自相貫通聖賢工夫如合符節此處透得過别處也透得過書雖多無異道也讀書貴精熟不貴貪多讀書雖多若不精熟不若少而精熟書雖精熟又要實體於身方能有得嘗謂讀得十章熟不如做得一章來做得一章來那幾章亦將湊得來體驗二字學者最親切讀書皆須體驗放自己身上來不然則書自書我自我矣濟甚事觀書須有感發奮勇之意方有進觀書有悅懌之意所入必深看書須沈潛反覆待其義理融液周匝方可放下讀書極難蓋難得聖賢之意或有讀周茂叔令二程尋仲尼顔子樂處所樂何事遂去他身上尋箇樂未免猖狂自恣自己不曾做顔子工夫遂欲樂顔子之樂不亦誤乎趨向不正與聖賢之言自相背馳如何讀得聖賢書趨向正底人方好讀書聖賢之文順理以成章自然本末兼盡脈絡貫通後世專意為文而義理反不足是欲巧而反不巧也程子以詩文害道非是詩文害道是作詩文者志局於此所以為道之害若道義發於詩文又何害不合他專心致力于此期於工巧便與聖賢為己之心不同于聖賢為學工夫必荒杜子美韓退之當初若能做聖賢工夫不學詩文其造必不止此今人只將聖賢之書資口語作文章與自己身心全無干涉天地間道理無一時息人心不可一時不存人之所以為人者理也茍不存得此理只營營於利以養血肉之軀豈不愚哉天地萬物之理即吾心所具者若到無私意處便貫通若貫通便流行無間此則仁也存飬工夫只在吾身上窮理則不分內外皆當格物窮理格物先從性情上窮究則見得仁義禮智渾然全具于吾心惻隱羞惡辭讓是非隨感而發就從此力加操存省察推廣擴充此便是源頭工夫根本學問又於日用事物人倫天地山川禽獸草木莫不究極其所以然明而禮樂幽而鬼神日月之更迭寒暑之往來嵗月之交運古今風氣盛衰國家治亂興亡民之安危兵之勝敗無不窮究方為窮理致知之學窮理非一端所得非一處或在讀書上得之或在講論上得之或在思慮上得之或在行事上得之讀書得之雖多講論得之尤速思慮得之最深行事得之最實窮理只是理會到底天下之理洞徹無疑然後行之沛然窮理須事事窮究窮來窮去又只是一箇理讀書須要章章精熟精熟後亦只是一箇理此所為萬物各具一理萬物同出一原也窮理須得心專一方有細密工夫方見得透徹若不專一則粗疏草略縱敏者亦略見倣佛而已學博而不精則流于駁雜理雖平時窮然必經歷試驗方熟道理只要熟熟則純純則誠誠則心與理一所發必不差所發不差則萬物順治主一之久至無間斷則熟矣道理不用安排只要審察得是察理精後力行便不難窮得此理於心又須存養省察工夫到方無罅漏朱子曰學者往往多歸異教者蓋謂自家這裡工夫欠缺奈何這心不下又無好藥方治得遂入彼去窮得此理須敬以存之方不失或曰未窮理時如何曰未窮理時固當主敬以立其本一本者無一物不是這箇理若有私吝蔽固便隔斷了成二本去故程子言放開意思打了習心方能與萬物一體方能合內外之道天人又何問哉若窮理到融會貫通之後雖無思可也未至此當精思熟慮以窮其理故上蔡何思何慮程子以為太早今人未至此欲屛去思慮使心不亂則必流於禪學空虛反引何思何慮而欲強合之誤矣學到貫通處縱橫上下都是這道理只是初間要窮格積纍工夫見得道理明白利祿便不敢茍取養得此心純熟利祿自不肯苟取此理吾固有之物棄而不求富貴身外之物求之不已是不知內外輕重之等也或曰富貴得之可以榮身道義亦可以榮身乎曰此何言也立身之道曰仁與義則人之所以為人者仁義也茍無仁義則人道絶矣那些富貴更作何用仁義既滅敗亡亦至昔成湯不殖貨利而富有四海桀紂聚鹿臺之財終至亡國榮辱可見矣或曰此以國言若人家乏財則衣食不足何暇治禮義曰古人以禮義立身以財養身但當以義制利不以利害義故程子以只營衣食無害惟利祿之誘最害心然衣食亦要合義不可茍人到義理貫通處處事自有要學者須要豎得這身子起本心不純者發用必偏此內外一致處敬齋針兼內外動靜而言所以不偏學者持敬只就衣冠容貌視聽言動上做便是實學若非敬如何扶得心身道理起敬則心專一專一則精明故聰明生敬則內直內直則無私故無己可克敬則無己可克是預先做了間邪工夫勇猛奮發之後須尋箇著實工夫做方能循序漸進日就月將以至成德若無日用常久工夫縱有英氣只成狂妄人坐不端莊則昏惰之氣必生心固以不存而理亦昏矣人之昏困是氣也持其志則昏自去人之心皆天理所為舍了理如何做得人如何處得事今人不去學自守預先要學隨時所以茍且不立人若日用間持守此志省察此理學便長進志不可一日墜心不可一時放立得志定操得心定不至移易則學自進志不可放倒身不可放弱程子曰懈意一生便是自暴自棄朱子曰才悠悠便是志不立立志已定用功不差潛心積慮之久義理自當融會志於道德者功名不足纍其心舍道德外亦無功名人苦無才此只是不窮理理明才自長然又須養氣以充之存心以察之看有才氣底人老年多不及少年是他無學問持飬工夫有德者易為才有才者易為德此才德相資處以才取人最難小人多有才也人貴乎有力量然當精求聖賢用力之方與理之至當方不負此力量若理有所蔽以此力量堅執不回則為害尤甚人有英氣方肯進取勇猛奮發之後須尋得箇常久工夫來做不使間斷方能實有所進不然一時意氣靠他不得見善不能勇為見惡不能勇去雖終身從事於學無以有諸己氣質之偏皆可克治要克治氣質之偏須涵養得大本完固則原氣壯病易除人之大病有三一曰粗惡二曰輕浮三曰昏弱人之氣貴乎剛却怕粗氣剛則才大氣粗則才疏才大而疏成少敗多故君子養其氣以至剛大完密則才德全矣人存養久則氣質自變涵養之道須深潛篤實方能制其飛揚之心消其粗厲之氣主一工夫易施心易純也心粗最害事心粗者敬未至也心沈潛則造理必深浮躁最害輕儇亦然昏惰亦然人收斂警醒則氣便清心自明才惰慢便昏憒也人多昏困只整齊嚴肅四字整得起學者之所患最是惰與輕惰則自治廢輕則物欲恣只一敬字可以治之人心要深沈靜密方能體察道理故程子以性靜者可以為學若躁動淺露則失之矣古人云宴安如鴆毒甚可懼也惟莊整嚴肅戰兢惕厲可以勝之雖整齊嚴肅亦要箇沈潛細密意思不可把捉太過把捉二字是半上半下事最難做不若索性從整齊嚴肅做上去更易為力如人起屋豎得柱頭端正則易撑持若豎不起柱頭斜撑持最難硬把捉便是恭而不安只常切提撕檢束不令放弛乃操存之道所謂必有事焉者也須收斂凝定則精神聚志向專察理必密今人屏絶思慮以求靜聖賢無此法聖賢只戒謹恐懼自無許多邪思妄念不求靜未嘗不靜也思其所當思言其所當言行其所當行乃立誠也不和不樂鄙詐之心入之矣不莊不敬慢易之心入之矣此禮樂所以不可斯須去身也人一縱於欲德即敗雖改之又當關防謹密不使萌于再有一分利欲便蔽一分天理利欲長一分大本便虧一分一息不存則天理即便間斷才昏惰義理自喪才覺私意起便克去此是大勇整頓得心起則學自進守得心定則德愈固存養工夫不至則省察工夫甚難省察工夫不至則存養工夫甚難蓋動靜體用本非兩事當隨處致力存養即所以立本窮理即所以達道存養後方能窮理窮理後又須存養不先存養則心體昏放大本不立何能窮理窮理後若不存養則理無歸著隨得而隨失矣何能為我有知貴精行貴果學貴博不貴雜守欲約不欲陋知既真行必正亦有因行之差而知亦隨而差者行在知之後故子路之強勇司馬君實之篤行皆有差使致知工夫至則二賢何可及也聞見之知雖小天德良知雖大然聞見之知亦從良知上來非有良知安能聞見而知但聞見之知則有真偽宜詳察而明辨也得其真則合內外之道矣良知出于天致知在乎人飬知在於寡欲保其知而勿喪在於誠敬保養於未發省察於幾微力行終之不矜細行終纍大德聞人之謗當自修聞人之譽當自懼難不貴茍免功不貴幸成悔悟於後不若省察於前不可以私意喜一人不可以私意怒一人處事應物不可徇己偏好須省察當為與不當為當理與不當理萬事有根本總領根本總領不正其餘俱不可正事物皆是理不順理處不得事上面生些計較便不好凡有一事必有一理以理處事自然順治後世以智計處事故不免煩勞或智不足遂致敗亂事事有一定道理須要見得明飬得熟應酬之際方無滯礙凡有一事必有一理事來當順理以應之然事未至已先有理故又先要立其體聖賢處事每斷之以義不顧利害智謀之士專計利害不顧義理然義理者人心之同然聖賢制事以義故人心自然歸仰智謀之士多失人心以致禍害處事不用智計只循天理便是儒者氣象處事不容一毫私意有一毫私意便非王道有公天下之心方做得公天下之事公生明私生昏私則有蔽有蔽便昏公則無蔽無蔽便明何以能公克己則公矣順理處事自治人心自服智計處事人不心服私則殊也被雜事昏擾者心役於物也茍能立己事雖多當整整不亂事事推尋義理以處之非惟事治學益進德益修程子曰見可喜可怒之事自家著一分陪奉他此亦勞矣聖人心如止水看盡天下事只要不失其本心心為主事為客以主待客則我不勞而事治蓋處之各得其所也程子曰己立後自能了得天下萬事天下之事不是自己理明身修決做不得日用間事當做而不做不當做而做皆是不能省察只徇己之偏也日用處事先要去了計較利害底心順理以處之則天理明人倫正天下縱有難處之事若順理處之不計較利害則本心亦自泰然若不以義理為主則遇難處之事越難處矣事雖要審處然亦不可揣度過了事雖要聽從人説亦不可為人所惑亂擇須精行須果人不能處事只是不能窮理理明天下無難處之事矣化民全要修身事事理會過至於融會貫通以造於約則天下古今之理在我有何不快樂學只是盡其當然之分不可要求異於人亦不可要求合於人人須要志氣剛大不甘作下等人方能奮發有為然必尋師友講究實做工夫自當有進進而不已不使間斷方能有成與人處當執謙然不可媚悅才媚悅則與天地正大之情不似諂諛二字修己治人之大病諛人者固是小人好人諛自修則不聞過治人則惡政日積學無他只要存得天理去得人欲天理是人物所以生底道理有生之初所稟得底道理人欲是有生之後因氣稟之偏情欲之感事物之交利害相形而生故天理是本然之善天所付底人欲是失其理動於物縱於情乃人為之偽非人之固有也然間邪存誠所以保飬天理關防人欲本原上工夫克治省察所以辨明天理決去人欲發用上工夫故操存涵養克治省察之功愈精愈密無少間斷則天理常存人欲盡去矣學只爭箇為己與為人若為己則學以博而理益明若為人則學博而成雜理愈偏而知愈蔽故程子以記誦為玩物喪志也日用問事事省察從天理上行才覺有私意便克去此進學之要人做工夫不可太過太過反成助長所以生病痛吕與叔是箇肯做工夫底人然所謂求見未發之中執而勿失亦是過了雖橫渠先生亦有做過了處如曰不舍其虛明善應之體是也程子工夫只是密無過處或曰過與密如何曰過則反疏今人只是箇好高大喜竒妙憚繩檢故做出許多病痛聖人必可學而至只是人不曉做工夫今人為學多在聲價上做如此則學時已與道離了費盡一生工夫終不可得道甚可惜也才氣高者有此病善要自己出功名要自己出此便是鄙陋狹窄人不足與有為也學者務名所學雖博與自己性分全無干涉濟甚事學者去得一箇謀利計功之心則心下自然坦夷安泰學者工夫寧下而勿高寧沈而勿浮貴博而不貴雜貴精而不貴玄寬不至慢緊不至迫怒不至暴愛不至溺今人未曾做得下學工夫但欲貪求高妙如何不入異教去未曾識得聖賢作用便要建立功業如何不入權謀功利人清高固好然清高太過則入於黃老人固難得廣大者然廣大太過則入於莊佛惟窮理之至一循乎理則不見其清高廣大乃為正學學不正雖熟何益非但無益為害最甚不學聖賢則學無窮宿今之學多只是對塔説相輪自知不真而以告人者即妄也告人而不盡心不忠也清高太過則傷仁和順太過則傷義是以中道為難當精擇而審處工夫不密則外邪乘隙而入若得工夫精又無間斷學須日夜長進學知為己方好商量做工夫學不為己縱讀書多講説詳不過誇多鬬博習為口語學愈博道愈雜學知為己亦不由你不戰戰兢兢今人學不進者只歸咎於天資是自棄也傅説曰學於古訓乃有獲念終始典於學厥德修罔覺詩曰古訓是式威儀是力皆是學之功看朱子晚年學甚進今人只是或作或輟枉過了日子及學不進則曰天資局定非自棄而何昔在南康何太守言當今秀才難教某對曰只有兩箇人教不得他問是誰曰自棄自暴者學才怠惰便入於自棄人茍能心勿忘勿助長則無處不是道理無處不可進學人若端莊靜一則天理即存大本自立及其至也篤恭而天下平一不莊敬則百邪交侵不待形於外而天理根原喪於內矣居業録卷二
