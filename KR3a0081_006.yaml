body:
  text: 居業録卷六明胡居仁撰天地第六為學規模節序無如大學造化規模節序無如先天圗先天以為水泛地故地不沈日晝升天夜入水此誣也朱子謂天以剛風旋滚得地在內不陷岐伯曰大氣舉之邵子曰天依形地附氣天地自相依附三説皆通邵説尤精當天依形地附氣此二語説得天地規模最精切凡有氣者盡屬天有形者盡屬地凡物皆然氣屬陽形屬隂天只是氣有甚形質地則有形質矣地雖有形質非附乎氣必不能存立天之氣亦必依地之形以行也天乃至大之物至健之體萬物所資以始故曰萬物本乎天天乃氣化之主生物之祖也周天三百六十五度四分度之一天非有度以天日遲速之差而名之天非過也只循其健體之自然日月非不及也亦只是循其自然之體以天日月三者較之則見天過日不及月尤不及此度數之所由分然論日則以日為主而見天與日之遲速論月則以月為主而見日月之遲速論嵗則以天為主而日月之數因可考歷家只是截法元不識歷日月交會而日食是月掩日每二十九日九百四十分日之四百九十九而一會不相食者度雖相同而道不相交也度相同道相交則日食程朱説日月各不同程子言日月乃隂陽氣之盛處運行不息行到子上則光在子行到午上則光在午本無一定之形象月虧盈之説以為月近日則威損而氣衰故光虧月遠日則勢盛而氣盛故光盈朱子用先儒之言以日月有一定之形影如丸如毬乃隂陽之精運行不息日速月遲是以或近或逺月受日光體魄常全受光常滿本無死生虧盈乃人見之則有正側不同正則見其光全側則見其光缺日月近則人在下見其側逺則人在中間見其正會而正交則月掩日而日食望而正對則日射月而月食二説不同朱子近是以書之旁死魄哉生明論之則程子亦有理霜露程子以為星月之氣朱子以為非星月之氣露只是自下蒸上此當從程子若其夜隂雲無星月便無露豈不是星月之氣朱子以露結為霜程子以為非是此當從朱子熱時有露無霜寒時有露便有霜豈熱時都感得露氣寒時都感得霜氣蓋是寒時露凍則成霜也雪雹則是雨凍結成也髙山頂上無露是被風吹散了濕氣露是星月之氣與濕氣相感而成故夜有雲則無露地乾處露簿潮是海水溢而滚上江去錢塘江淺故有湍激之勢而潮勢大揚子江水深故潮勢平先儒皆以為潮隨月是也月臨子午則潮生子午乃隂陽之極也月臨卯酉則潮退卯酉乃隂陽之交月為太隂水隂盛故從其類自朔以後望以前月臨午潮生月臨子汐生望以後朔以前月臨子潮生臨午汐生餘則先儒之論已備前年二月梅花始開今年十二月梅花開天地間氣數不齊如此天地間物只是一箇消息有息必有消消則必息然息者自息消者自消自然之理亦不是已消者再來做息故釋氏輪回老氏歸根返元不成造化矣如人家富而貧貧而富不是取得元財來致富是再生出財來不必以既返之氣為方伸之氣此可謂識造化之妙矣天地間無處不是氣硯水瓶須要兩孔用一孔出氣一孔入水若止有一孔則氣不能出而塞乎內水不能入矣以此知虛器內皆有氣故張子以為虛無中即氣也然天地間氣剛者勝柔實者勝虛強者勝弱重者勝輕疾者勝緩謂之無氣則不可無處不是氣只是人不見耳有形影人方見有形影是質質是氣之融者氣之發用處即是神陳公甫説無動非神他只窺測至此不識裡面本體故認氣為理張橫渠言氣之聚散于太虛猶氷之凝釋于水豫未敢以為然蓋氣聚則成形散則盡矣豈若氷未凝之時是此水既釋又只此元初水也天地間氣化無一息之停人物之生無一時欠今天下人才儘有只因聖學不講故瞢倒在這裡天人氣脈常相關春秋凡災異必書以見人為所感洪範咎徴休徴各以類應如此則戒懼修省自不能已國家可保也二氣交運便齊不得故所生物萬有不齊而剛柔善惡邪正古今淳漓治亂盛衰亦萬變不一雖萬變不一然其間莫不有一定之理聖賢隨其事而以理處之雖萬變交于前而吾之心未嘗不定也只是一箇真實道理流行而天地萬物各得其性而天地之所以為天地萬物之所以為萬物莫非實理所為人之處事只當順其理之當然則自然順治若著些子私意便是逆天違物即亂之源也有理而後有氣有氣則有象有數故理氣象數皆可以知吉凶四者本一也居業録卷六
