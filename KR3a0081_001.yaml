body:
  text: 居業録卷一明胡居仁撰心性第一今人言心學者便要說静時無心居仁問之設若無心亦須有理彼又應曰静無而動有彼信以為静時眞無心與理矣夫天命之性與生俱生不可須臾離故静而未有事接之時則此心未動此理未發然此時此心寂然在内此理全具于中故戒謹恐懼以存養之若眞無心與理又戒懼做甚又存養箇甚必有物在内故須主敬須存養故程子以為静中有物静中雖無所知覺亦有知覺在又有因程子說静中有物遂要察見本體㸔未發以前氣象此又非也静中只有箇操存涵養曷嘗有㸔見察見或問周子言静無而動有何也曰周子言無以未形而言非眞無也乃無中含有也故朱子解之曰静非無也以未形而謂之無今人言心便要求察而見其心之體則内裡自相擾亂反無主矣然則古人言提撕喚醒非與曰才提撕唤醒則心惕然而在非察見之謂也人心萬理咸備無所不有只要修省得到理無形而具于心心具是理而無迹故可謂之虛不可謂之無不可謂之空空則無矣心不虛不能涵具衆理所以心體本虛也心與理本一心雖虛理則實心中無他物只有此理全具在内所以為是心者理也所以具是理者心也故理是處心即安心存此理即在非但在己如此在人亦然所行合理人亦感化歸服非但在人如此在物亦然茍所行合理庶物亦各得其所先儒言人之為學心與理而已三代之治順理者也心與理本不相離逐物欲則離矣異端則離矣聖人則心與理一也賢者合于一也心體本全元無虧欠或為昏氣隔塞或為舊習斵喪所以要涵飬者只要養完此本體則天徳自全身行一日不過百里所厯不過十二時心則頃刻千萬里頃刻千萬嵗蓋身則梏于形氣心則通乎神也心理不相離心存則理自在心放則理亦失理明則心必明心明則理亦著存心窮理交致其功方是心雖主乎一身體之虛靈足以管乎天下之理理雖散在萬事用之微妙實不外乎一人之心知此則内外體用一而二二而一也離内外判心迹此二本也葢心具衆理衆理悉具于心心與理一也故天下事物之理雖在外統之在吾一心應事接物之迹雖在外實吾心之所發見故聖人以一心之理應天下之事内外一致心迹無二異端虚無空寂此理先絶于内以何者而應天下之事哉由其專事乎内而遺其外不考諸迹而專求諸心厭棄事物之理專欲本心之虛靈是分内外心迹為二本矣愚嘗思之内外心迹終二他不得空則内外俱空實則内外俱實有則内外皆有無則内外皆無是則心迹皆是非則心迹皆非正則心迹皆正邪則心迹皆邪固未嘗二也吾儒則心與理為一故心存則理明心放則理昏釋氏則心與理二故心雖存亦無理儒者用戒謹恐懼而心存是敬以直内萬理俱在而遇事尤加敬慎故心與理不離釋氏則屏絶思慮事理使不撓吾心以為存惟無事時如此做得事來一撓便亂了是他心存時已與理離而為二因心與理二故一動便亂或謂釋氏有體無用予以為正是他無體故無用理與氣不相離心與理不二心存則氣清氣清則理益明理明氣清則心益泰然矣故心與氣須養理須窮不可偏廢或曰修養家之飬氣同否曰修養家所飬乃一身之私氣私則邪矣惡人氣亦盛何也惡人乃惡濁麄暴之氣血氣之私也若清純剛直乃正氣也嘗驗之存心密則麄暴昏濁之氣自消理直則剛大之氣自生心也理也氣也二而一也正則俱正邪則俱邪為物欲所勝者皆是心不能做主也處事不得其宜者亦是心失其職也此涵養省察之功當盡也心具衆理所患者紛亂放逸惰慢故須主敬主一無適所以整其紛亂放逸整齊嚴肅所以救其惰慢此存心之要法也涵養本原與窮索義理實交相渉葢人心只有許多義理更無别物涵養既至則天理自明窮理既精本心愈安也心精明是敬之效才主一則精明二三則昏亂矣心在重處發熟處難忘若利禄重則心在利禄上發功業重則心在功業上發那邊熟心只從放那邊是戀著舊習也若非勇猛奮發擇善固執改革舊習雖欲勉強操持心未易収嘗謂學專為己心自少至外馳更加主敬其有不存者乎心有主雖在閙中亦静故程子以為金革百萬與飲水曲肱一也然必知之深養之厚心方不動心有存主即能宰制萬物孟子求放心是本原工夫釋氏置心于無用之地曷嘗有主滿腔子是惻隠之心則滿身都是心也如刺着便痛非心而何然知痛是人心惻隠是道心無事時不敎心空有事時不敎心亂心無主宰静也不是工夫動也不是工夫静而無主不是空了天性便是昏了天性此大本所以不立也動而無主若不猖狂妄動便是逐物徇私此達道所以不行也己立後自能了當得萬事是有主也放心是逐物於外惕然警懼則即此而在矣是知戒謹恐懼乃存心之要也用心不可太過過則生疾心為神明之舍過苦則神枯惟主一無適優㳺涵泳自然義理暢明容莊則心正未有外貎不莊心能一者人莊敬體即立大本即在不然則昏亂無本敬是莊嚴畏謹之意程子說主一是直截在心地上做工夫言者心之聲事者心之迹心正時言必不差事亦順理人心公便與天地同體才私便與天地萬物暌隔釋氏以自私之心強包括天地萬物故背逆天地絶滅人物吾儒是隨事盡理以存其心所謂敬者只是專一謹慎無事時心專一在此不敢怠惰有事時心亦專一在此事上不敢怠惰所以無事時心湛然在内有事時即是這箇心去應察處置所以動静表裏本末共此心只是箇專一畏敬佛氏只是硬把捉繫縛這箇心方其無事時把捉繫縛得住有事時便亂了觀鼻端是取至近一物以覊繫其心使動不得嗚呼心至靈至貴為萬事主宰而受制繫于一物可哀也朱子曰孟子說存其心雖是𦂳切却添事不如孔子只說居處恭執事敬與人忠立定規矩與學者守使之心自存今之學道者多入異教是他做存心工夫上差了程朱闢異端甚詳今被他反引其言入異敎去因此風已盛鼓惑後學陷溺人心世道必愈衰豈天意如此柰何柰何釋氏要無心終無不得故在空中見出一箇假物事以為識心見性以為不生不滅其實未嘗識心未嘗見性也天理有善而無惡惡是過與不及上生出來人性有善而無惡惡是氣禀物欲上生出來五性感動而善惡分萬事出矣性如水之源感動是水之流也如源本清流出來便有清濁清者是不為沙塵所溷濁者為所溷也用力之道當濬其源澄其流理無不善所以發而為隂陽五行以生人物者氣也其交感錯綜益參差不齊而清濁偏正于是焉分而賢愚善惡出矣雖有賢愚善惡之分然本然之善未嘗不存乎其中但賢者因其氣之清而能明其理有其善愚者因其氣之濁以蔽其理而失其善流于惡矣故孟子言性善是就所生所禀之理而言孔子言性相近指氣禀而言韓退之言性有三品是專就氣禀而言程子言善固性也惡亦不可不謂之性是兼理與氣禀而言如清者為水而濁者亦為水蓋水之源本清流出去便有清有濁理之源本善禀於人便有善有惡故論性至周程張朱始備若荀子言性惡掦子性善惡混失之逺矣荀子只性惡一句諸事壊了是源頭已錯末流無一是處故其以禮義敎化為聖人所造作偽為以矯人之性而化人之惡殊不知天高地下萬物散殊而禮制行矣此皆吾性中所具之禮聖人因而品節制作之禮義敎化既成又足以正其情飬其性節其欲成其徳此足見禮樂敎化自吾性中出聖人因而成之則性善無疑矣孟子言性善在本源上見得是故百事皆是荀子在本源上見錯故百事皆錯荀子不知性之為理只在情欲上㸔故曰性惡遂以禮義敎化刑政皆聖人偽為其罪大矣葢禮義敎化政刑皆天理之當然人性之固有聖人因而裁制之惟伊川程子言性即理也眞實精切發明孟子性善最盡朱子又曰性者人心所禀之天理則又曲而詳矣朱子曰未感物時若無主宰則亦不能安其静只此便自昏了天性不待外物之引然後差也李延平曰人固有無所喜怒哀樂之時然謂之未發則不可言無主也定性無内外無將迎明道不惟所見端的又工夫完純非去聖不逺不能如此嘗驗之無内外工夫猶可能無將迎非心性已定無一毫牽引之私不能也雖昏亂之世公論猶存此見人性之善處此見秉彛之不可冺處善乃人性之固有人之所當為故張南軒曰為己者無所為而然者也董子曰正其誼不謀其利明其道不計其功此南軒董子心術之正也不然是以私意為學固已與道離矣韓子以博愛為仁雖不是猶勝以覺言仁者故朱子訓心之徳愛之理又曰仁者本心之全徳中庸曰仁者人也朱子曰人指人身而言具此生理自然便有惻隠慈愛之意孟子曰仁人心也程子曰心如糓種仁則其生之性孟子曰人皆有不忍人之心朱子曰天地以生物為心而所生之物因各得夫天地生物之心以為心故人皆有不忍人之心合此數說而體驗之仁可得矣仁則天理渾然萬物皆有生意人心若仁則萬物皆在吾生育之中本心之生理便是仁不仁戕其心生理也涵飬得本心熟到清明和暢處仁可得矣心如糓種仁則其生之性古今說仁字惟此最親切醫書以手足風頑為不仁程子善之葢人而不仁私意蔽隔天理不能貫通天地萬物漠然與己無干如風頑之人手足疾痛不相管攝也程子說雞雛可以觀仁切脈可以觀仁是無時無處不體驗雞雛是生意醇粹處切脈是生理貫通處程子用心熟方見天地人物分雖不同同此一理形雖不同同此一氣故聖人所以眞實懇惻以仁民愛物乃其心之自然非強而為之也其所以民安物阜而上下與天地同流者亦其效之自然非有一毫增益于性分之外也民之所以仰瞻感化者亦其心之自然而不容遏非有强也所以然者理一氣一故也欲生于氣是氣為主而滅乎理須使理為主而氣順焉人之知識才能本於性然亦不能不蔽於氣故性與氣皆當養之以復初不可自恕葢恕者求仁之方施于人之事也若施於己則自治不嚴偷惰茍簡進修必倦改過必不勇矣為善最樂即是心廣體胖也居業録卷一
