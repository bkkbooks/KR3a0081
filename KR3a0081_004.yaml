body:
  text: 居業録卷四明胡居仁撰帝王第四古者必德足以感天下之心功覆天下之民斯為天下所宗而為天子唐虞三代是也至孔子德雖足以感服天下之心然無天子之薦又無百里之地以為因故功德不及斯民所以終為匹夫自秦而下以強力姦計而得天下者甚多此亦時勢不同也蓋古者諸候萬國疆域嚴固非首出庶物之人豈能服萬國之心故孟子以為無不仁而得天下者自秦立郡縣之後無諸候翰屏夾輔之勢而姦雄往往以強力智計相角又不遇聖王之興以收之故智力勝者得之亦勢然也堯舜生朱均瞽鯀生舜禹清濁美惡雙化莫測雖聖人亦莫能與也四凶堯深知其惡只是用其才當時舜禹臯陶稷契未出無人可用故如此聖人在上駕馭之他亦不敢露其惡天下事必君臣相遇而後可以有為上者如湯之於伊尹髙宗之於傅説文王之於太公次者如桓公之於管仲燕昭之於樂毅髙祖之於子房先主之於孔明皆君臣相知相契之深文王雍雍在宮肅肅在廟不顯亦臨無斁亦保顔子明道近之文王得太公便載之後車是相知相契深故敬之至禮之重或問湯武同時而生爭乎讓乎分天下而治乎共天下而治乎曰相讓而共治曰以誰為君曰以年長而功多者為君蓋聖人無圖天下之心只看道理合如何安然居之桀紂失了君道故湯武不得已而伐之蓋君者所以為天下主代天理物以養天下之民今桀紂非惟失君道又殘民害物乃天地間一大賊也湯武不幸適在其時當救民之任故不得避伐上之嫌而坐視也有聖賢之君必有聖賢之佐若中材之君有聖賢之佐亦可成王業太甲成王是也此感而彼應者心同此理也處置得宜而人心服者亦心同此理也秦漢以下為治者不過處置上做不知上一截既不知上一截則下一截亦偶中耳豈能盡得其宜此先王之治所以難復也或曰老佛亦曉得心同此理可謂能知上一截何以反害天下曰老佛只想像一箇道理原頭以為此心此理無不同非真能知萬殊所以一本也三代以下之君漢髙祖天姿最髙惜乎無真儒輔相若得真儒輔相三代可復那時秦法苛虐不可因戰國又無治天下之法可傳若有真儒舉先王之法髙祖必肯依從漢髙祖只勝得一箇無仁義底人若遇仁者髙祖便著臣服韓信只勝得無智勇底人若遇智勇韓信計不能施矣項羽當初從范增之計以立義帝當時亦是時勢當如此君臣之義既定豈可更行弒逆光武之於更始處得便好更始本不足以為君光武漢之同姓固可中興而光武亦不殺之是善處君臣之變者也漢武帝才足以有為惜乎多欲周世宗才足以有為惜乎未學宋神宗亦欲有為惜乎汩於功利人君不務學便以禮樂制度為瑣碎不足為而欲徑趍功利殊不知天生聖人代天以施教化聖人制禮樂代聖人以成教化是天假手聖人故天不言而萬物安聖人假手於禮樂故已不勞而教化行漢景不殺母弟梁王亦可為天下後世法梁王以母之寵欲求為太子議臣袁盎持正義以諫止之及梁王殺袁盎則罪固當死然皇后涕泣不食必至傷生故景帝寧屈法伸恩此亦天理人情之至也隋文帝篡國之君王仲淹獻太平策可謂不知人篡弒之人其身犯大逆若北面以臣之即逆黨也稍知義理者不為也且古之仕者皆欲行道以濟斯民篡弒之人其身不正不可以君天下又可與之行道乎胡氏責唐太宗不能正楊廣弒逆之罪聲大義以討之此言誠當茍非其人道不虛行太宗以英武之才謀取天下惜乎無學未嘗窮理正心去私窒欲以當然之理處當為之事伸大義救民命故用許多智計甚為鄙陋其立心殆與竇建德等無異但才智勇略非建德世充所及豈可以湯武之事望之使其真有聖王之學必仁義奮發誠心誓衆聲楊廣弒逆之罪毒流四海軍民被害之由傳檄州郡播告天下宣諭兩京以為身任方面不忍視賊不討坐視生民困苦死亡而不救願與天下豪傑共興義兵以行天討則義士奮發生民引領有征無戰矣建成太宗事先儒論之詳推本言之人之心純乎天理乃處得此等事建成元吉不足責太宗與髙祖謀天下皆是利心孟子所謂父子兄弟懷利以相接者當時建成太宗元吉各置僚屬將佐勢固相軋若使太宗無利心兄弟骨肉之間一以天理相接至誠事兄愛弟或庶幾焉如建成元吉見疑解辭權位退讓處貧如終不容寧死而已不可殺兄以賊天倫當時太宗自言骨肉相殘古今大惡亦知慚矣惜乎人欲勝天理微處置不去也歐陽永叔言秦以功力取天下力則是功則非秦以兵力攻取使生民肝腦塗地罪莫大焉何功之有綱目書周世宗廢無額寺院禁私度僧尼夫聖王之制度皆本於天理之自然而裁成之以為天下不易之定準謂之額可也今周世宗既廢無額寺院必存有額寺院殊不知寺院乃天理中之必無者豈可立為定額乎禁私度僧尼然則僧尼又可以公度之乎據事直書世宗不學之陋自見矣宋太祖分明是篡亦是乘五代之風五季之時君臣道絶由唐末藩鎮不臣沿習以致此極今日迎新天子明日迎新天子今日黃袍加身明日黃袍加身宋太祖分明是弒君自開闢以來君臣道喪莫甚於此時可惜此等英雄人反做此等事然自仁宗後風氣漸復人才之盛三代以下罕比此亦氣運使然有真儒而不用所以民不被其澤故儒風振作過於漢唐語其治終在漢唐之下大抵君臣相合各從其類好道之君方能用有道之臣好利之君必用計利之臣宋神宗滿朝君子獨用安石者以安石利心與神宗合也如安石憂財力困窮而言治財之道神宗即位初便言當今以理財為急務此二人者利心相契其行泉府青苖市易等法雖攻之者甚衆終不能破二人功利固結之心也宋徽宗畫最妙世傳為至寶徽宗為君玩物喪志如此失天下宜矣向在南昌與張廷祥論三代以下有漢髙祖天姿朴厚志髙才大承秦之暴無法可因彼時有真儒者出舉先王之法庶幾可行惜乎當時無人雖有張子房乃雜黃老智謀有餘非先王之學韓信等俱是功利蕭何等亦非修身正主之學其後有漢武帝志髙才雄慨然欲大有為彼時若董仲舒本領純正庶幾王者之佐然見道亦不甚分明亦無以使漢武實下手做工夫以去私欲而復天理故漢武雖以有為之姿終為物欲所勝而不克成也至宋神宗天資明敏奮然有為當時有程子等真聖賢之佐惜乎為王安石所間神宗不能信用安石亦志髙才敏惜學術不正若使明道為相安石為參佐亦可有為明道才大德盛行道濟時復三代之治如反掌故廷祥以為此天地間大機會惜哉堯夫以皇帝王霸並數便不相倫蓋帝王無異道是純乎天理無一毫人欲之私霸者元是私意縱窺測得天理來用只是假豈可與帝王同年而語哉永樂間道義名節之士未見只有許多才子出來弄詩文春秋之時霸主之有功於中國莫大於齊桓晉文晉悼然桓公之才大晉文之才雄悼公之才髙惜其無學力故天理不明急於功利或曰使文王為之何如曰使聖人為之必率諸侯以循軌度輔屏王室朝貢以時必無不庭之諸侯僭王之吳楚談弦江虞必不見滅信義既孚盟歃必不屢用仁恩既洽陳鄭必不肯叛德威既立荆楚必不敢慿陵禮樂征代自天子出已則奉命而行所以贊時王以興復文武成康之業必不如桓文攘天子之權以濟己之私也霸者有一半功便有一半害霸者雖有功於當時然三綱五常卒扶不起故仲尼作春秋以明之霸者非有利於己底事皆不做言與己無干也不知仁者以天地萬物為一己皆吾事也聖人不忍生民塗炭故取霸者之功聖門明乎修己治人之道故羞稱五霸先儒言王道之外無坦途舉皆荆棘仁義之外無功利舉皆禍殃此推其極而言也事事存其當然之理而已無與焉便是王者事著些計較便是私吝心即流於霸矣王道最易行只要君身修皇建其有極王道根本天下古今共此箇道理大用之則大治小用之則小治小失之則小亂大失之則大亂誠者為王假者為霸竊者為姦未有捨此而能濟者古今敗國者皆自敗也或荒淫或遊畋或暴虐或狎小人或好宮室或好貨聚斂皆亡國之具也故為君者必兢業修身任賢去姦愛養斯民乃保國長久之道女色之害甚酷小則亡身大則亡國紂嬖一妲己而殷之宗廟社稷滅亡幽王嬖一褒姒宗周喪滅文薑淫而殺魯桓齊襄二君宣薑淫而衛為狄滅女色之害可勝言哉周公誅管叔是理當誅周公雖不欲然天理所在周公不得違也周公之誅管叔湯武之伐桀紂皆聖人之不幸非其本心也或曰何以見湯武不幸處曰使桀紂賢湯武為諸候豈不自在王介甫詩言周公恐懼流言日王莽謙恭下士時脫使當年身便死至今真偽有誰知此是據他地頭説豈有心通乎道而不能知人者哉當時六軍萬姓皆知周公之心詩曰既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將又曰公孫碩膚赤舄几几非能知周公者乎王莽之姦雖當時識之者少然其過服垢弊飾為節儉假為謙恭無非矯情干譽之事包藏禍心之謀其藏於中者如此其發於外者必有赧然之色偏詖文飾之言亦非難知也但不遇有道者照之先儒言張子房平生事業皆自素書中出此誠然也蓋其權謀智術處身處事進退行藏與素書無一不合後世智謀之髙妙無出於此但其不知天理本然之妙足乎已而感乎人有諸中而形諸外不必全假智謀明哲保身亦非全計利害以此論之黃張之道不出一私字聖賢之道不出一公字韓信言漢髙帝善將將漢髙亦非善將將者古之善將將者舜征三苖而用禹湯伐桀而用伊尹武王伐紂而用尚父此乃善將將也如漢髙用計謀以馭韓彭又使韓彭不得其善終可謂之善將將乎或言光武善將將許多功臣皆得善終曰光武亦非善將將者古之善用人者盡其才進其德保其身誠感其心用盡其才位稱其德賞當其功故各止其所各安其分何用許多智計以制服之乎曰以韓信之智謀才氣其志又在功利若非髙帝有以制馭之其患有不可勝言者曰髙帝本領未正君德未全故其所為不過如此設使本心純是天理不以謀天下為心只以救生民為事義以舉事誠以感人四海之內皆引領向風感於仁勇於義況韓彭乎當初漢髙本以利天下為心韓彭亦以利合髙帝既欲謀天下韓信豈不欲謀國乎髙帝既欲為帝韓信豈不欲為王乎韓信功利之人不足道為漢髙惜也曰湯武誅桀紂後遂為天子何以見其不謀天下曰人之所得於天而全具於我者謂之性聖人只是盡性曷嘗有一毫利心舍吾性分之固有以求富貴賢者且不為況聖人乎聖人體具於中用之發于外者自不容己其仁民愛物皆自至誠中出天下之人仰戴若父母若嬰兒失所皆涕泣思親湯武安得不憐而救之乎况桀紂暴惡已極天命已絶湯武亦不敢逆天而不伐曰何以見桀紂天命絶曰天命者天理也君者所以為天下臣民之主天命之以養斯民者今乃逆天為暴則自失君道自絶其命不可為君矣況天命具在人心人心怨叛如此則天命之絶可知曰周室既衰孔子作春秋以尊周為義何也曰春秋之時周室既衰而先王德澤未泯民皆思周未忘觀黍離及匪風下泉之詩則可見雖以齊桓晉文之盛猶曰咫尺天顏踐土猶三覲王或又曰使孔子居桓文之位如何曰只是輔周天子修明文武周公之典以號令天下率天下諸候以奉周法循侯度興禮樂明教化若攘外安內之功乃其餘事耳將相一體方能成天下之務韓信李訴能成其功以有蕭何裴度協心於內宗澤嶽飛不能成功是為汪秦沮撓於內也諸葛孔明司馬懿智勇相等只是孔明公平正大之氣非懿所能敵故懿舉中原之兵不能當偏蜀之師那時不敢出戰軍師已喪氣孔明三年不死懿成擒矣諸葛孔明三年不死則天下定矣當時司馬懿不敢出與漢兵戰則三軍之氣自然沮喪況孔明屯田足食因其土以為耕因其民以為衆推恩立信以鎮撫之吾氣既壯則賊氣自奪荀彧有智謀而從曹操是不講學之故霍光忠智有餘其妻弒許后而不誅亦是不講學之故劉伯溫深護唐太宗不知仲尼之徒無道桓文之事伯溫智謀之士不知王道之大故也人才難得當堯之時人才之盛生民未有此後獨周為盛周末孔顔之生人才亦可謂盛此後惟宋也人為小小功業動其心只是不識義理如鄧艾下蜀有甚功業助篡逆以滅人之國罪大矣謝安東晉中第一人物其氣英明惜乎未學又好尚清雅曠達無誠心整頓物理當時有多少當為事都不做陸宣公才極精密周遍三代以下罕及但唐德宗庸君不能盡其才豈公不以格君心為先務乎人才氣雖大不可無學力如寇萊公後來因天書復相是相率為偽更做得甚事為宰相不能搜訪天下賢才而用之更使誰去為治朱子言呂夷簡為相有范文正不能用更有甚相業文天祥當宋末賈似道當國專權事已不可為矣後間率兵勤王又與陳宜中等掣肘已不是時候況天祥之才本疏乎功臣多不保其終者蓋其始初君臣只是利心相合未嘗以道合其所為者多權謀智計未嘗以道義匡其君故其君亦以權謀智計待之或君忌其能臣挾其功欲保其終豈不難哉儒者只務引其君當道道既行則可以保天下之民豈不能保其身乎然則揚雄儒者不保終何也雄非功臣亦非以道事君者子路之死程朱之禁如何子路亦非能以道事君程朱是以道事君而不合者君子小人不可共治是善惡邪正必相反也君子必治小人必亂者蓋君子之德足以格君化民况人以類從君子用則賢才舉德政修安有不治小人用則姦邪進虐政多安有不亂君子小人自不相容其類不同也君子進則小人退小人進則君子退未有君子小人共治者也然則堯用四凶豈不是小人曰堯聖人也聖君德盛勢重方可因其才而用之孔明用魏延如何曰魏延雖小人非是大姦惡故孔明亦因其才而用之君子與小人勢不兩立互為消長此治亂所由分君人者所當精察明辨以進退之出仕者亦當自守不可誤入小人之黨與小人為黨終必敗也進君子退小人此為政第一義然須果斷以行之若是好賢而不能進惡小人而不能退反自取禍敗處小人最難位髙勢重可以處置小人才髙德重可以處小人處小人不可一向疾惡之須先以善養之養之不格然後從而處置之小人敗天下喫緊是移惑君心又引小人來居要位君子以有才為幸小人以無才為幸恃才者最是人之大病不惟敗事必不能保身舍己從人方做得天下事人肯自修則喜聞過喜聞過則能來忠直之士忠直之士進則小人退君子進則國家之治本於此不自修者則忌聞過忌聞過則心好諂諛好諂諛則讒諂面諛之人進君子退矣國家之亂本于此忠邪不兩立盧杞等黜然後陸宣公之志方可伸其一二而唐室之復不旋日矣忠賢既用姦邪自息如春陽既長隂凍自消程子曰論治須要識體如修德建極化導臣民精擇宰相分建衆職者人君之體也致君澤民精選人才進賢退不肖者宰相之體也宣布君上德威設立政條分任有司察民安否利害以施勸懲黜陟上司之體也愛百姓施惠澤明教化慎政刑均賦役理寃獄此有司之體也天生蒸民立司牧以養之若縱欲為暴便失君道師保得其人則君身修宰相得其人則百職舉宰相之職在於進賢退不肖進賢退不肖在於能知人知人在於修身修身莫先於窮理窮理者在於讀書論事推究到極處朱子説科舉雖做了狀元可惜輸了這邊工夫西山真氏先心經而後政經則身心乃出治之本也為治之道有二修身明德以感發作興其同然之善心是頭一等事處置得宜是第二等事二者不可廢一朱子曰公卿以下士為難士以不自失為貴世間人才儘有亦多有肯做功業者只是理不明做功業不出此大學以窮理為先也先王之世一道德同風俗故人才只是一樣後世有道學之士有節義之士有功名之士有利祿之士文人舉子詩人墨客又有老釋異端之徒倡優技術雜然混處所以害道敗俗不可勝言原其所由皆因王政不行小學大學之教不立故人各以己意為學傳習之久遂有許多等人物若政教立則皆在吾化育之中所謂節義功名利祿文人詩人盡歸於道德而學者亦有基本可立不流於異流倡優技術亦皆變於正人矣或問如何得盡知天下之賢朱子曰只消用一箇好人作相自然推排出來有一好人作臺諫不好人自住不得天下人才要聖人出來得位收拾隨其所長而用之茍無聖人在上裁而用之則清髙者多隱逸才智者多趨功名曠大者多入異端只一箇正大道理聖王在上發出來鼓舞得天下人起區區計謀不足道賢才國之楨幹民社所依以立也漢以鈎黨殺許多名士而國隨以亡宦官亦自剝其廬其後宦官悉為袁紹所誅無少長盡被殺至二千餘人有非宦官因無鬚而誤殺者篡弒之君不能致治者蓋以其悖天理喪心德無以教其下而有道之賢必不肯為之臣智力勝者僅能把持得住喪敗者多矣天地只是一箇生物之心聖人全天地之心故仁民愛物自不能已天地之情正大聖人之情亦正大故不為煦煦之仁孑孑之義為煦煦之仁孑孑之義者一則所見小二則立心私程子曰聖人能使天下順治非能為物作則也惟止之各於其所而已聖人作事動循天理動中機會循天理則人心服而化中機會則事當而易治聖人有憂世之心無忿世之心蓋世道既衰上無明主聖人在下只得隨時盡心拯救不可忿世而長往也古之聖賢只要盡此道理事業則隨所遇富貴貧賤不足道聖賢生於治世有治世事業生於亂世有亂世事業事業雖殊其道則一聖賢治世是從天理上展開去所以人不可及後世才智之士用盡氣力只見功業之卑今人為利而仕便不正當了縱有小小功業亦不濟事凡處事只要循理不可先計較利今人自置身於卑汚茍賤之中却要去外面求貴才不勝不可居其位職不稱不可食其祿不為堯存不為桀亡大行不加窮居不損須要識此人要做事業亦是私意君子之學只是明理應事事當為處則汲汲為之不倦不當為處則截然不為故禹稷憂而顔子樂也士君子只當守道安貧以待君上之求不當自求進求進則先失其道矣在上者身既修理既明則德望素著不待政教號令之出而民已歸服景仰況於設施之際事得其宜政教號令既出刑罰既施如雨露霜雪又何民之不感悅畏服乎君臣不以道合而以功利相濟者鮮能保其終富盛之久者自然驕奢淫惰此盛之所以必衰居業録卷四
