body:
  text: 居業録儒家類提要臣等謹案居業録八卷明胡居仁撰居仁字叔心號敬齋餘干人是書皆其講學語録居仁與陳獻章皆出吳與弼之門而宗旨截然互異獻章之學上繼金溪下啓姚江居仁則恪守朱子不踰尺寸故以敬名其齋而是書之中辨獻章之近禪不啻再三蓋其人品端謹學問篤實與河津薛瑄相類而是書亦與瑄讀書録並為學者所推黃宗羲明儒學案乃謂其以有主言靜中之涵養與獻章之靜中養出端倪同門冥契特牽引附合之言非篤論也正德中有張吉者嘗刪其書為要語又有吳廷舉者又刪其書為粹言此本為𢎞治甲子余祐所編猶為原帙祐字子積鄱陽人𢎞治己未進士官至吏部右侍郎年十九時受業於居仁居仁以女妻之而卷首序文自稱門人蓋用黃幹編朱子集之例幹又用李漢編韓愈集之例也然考皇甫湜作愈墓志稱愈女初適於漢後乃離婚嫁樊氏漢稱門人而不稱壻蓋緣於此幹及祐沿襲其稱殊為不考閻若璩潛邱劄記乃以為重道統而輕私親則又曲為之詞矣乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀居業録原序聖賢之學明諸心體諸身措之家國天下言語文字非其得已者也夫道固無乎不寓而吾心為之統會行心之迹也言心之聲也孰謂知人者惟於其行不於其言感人者亦惟於其行不於其言乎六經四書暨夫程朱之論萬世所共仰賴不可磨滅道存焉耳敬齋胡先生諱居仁字叔心饒郡餘干人也弱冠時奮志聖賢之學往遊康齋吳先生之門退而藏修於家書無不讀理無不窮存諸心者不以一時而或息反諸身者不以一事而或遺久之則知益精而守益固飬益裕而得益深矣居業録者先生道明德立理有契於中而無可告語事有感於外而無可施行故筆之於册而命以是名蓋取易修辭立其誠所以居業之義也其間論聖賢德業經傳旨趣學問功夫政教基本性命淵微不一而足此外則於異端佛老之學尤加深辨詳闢惟恐其或陷溺人心變亂士習蓋亦有為而發故其詞繁而不殺焉祐嘗因是録竊觀先生之學纎微昭晢有不可掩之明分寸積纍有不可泯之實強毅堅忍有不可易之操宏達周悉有不可窮之用逺追千古舉天下不足以回其心高出一世舉萬物不足以撓其志讀者深思而有得焉則其學之醇道之美逈然無儔躋之濓洛關閩之列可也言果不足以知人抑果不足以感人乎雖然先生之道本欲施之天下國家而與斯人相忘於無言之境奈何卒與時違未獲小試乃不得已而有是録其志可悲也己其道可慨也己方且怡然自得若將終身不肯小貶以徇時焉嗚呼所謂不易乎世不成乎名遁世無悶不見是而無悶先生真庶幾矣成化癸卯祐初謁函丈請教方恨親炙之晚而猶冀夫可卒業也踰年先生夀甫五十遽捐館舍豈惟祐之不幸尤斯文斯世之不幸也抱持遺書於今草載昏愚之質殊無進益然而每一讀焉凛若先生之臨其上不敢不思奮勵而圖無負於將來也若夫道德宏深言論純粹膚陋之見未易窺測必有知德知言君子尚論先生於天下後世也耶𢎞治甲子秋門人余祐謹序
