body:
  text: 居業録卷五明胡居仁撰古今第五天髙地下萬物散殊而禮制行矣蓋尊卑上下貴賤等級以至儀章度數皆有一定不易之理不過假聖人之手而制作之便成箇禮天下後世遵而行之其實未制作之時此禮之體已具也天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉此禮樂之本意也聖人制作只是因其自然之理曷嘗有一毫私意安排禮樂既成則所以節民之欲感人之心成人之德乃自然之功用故程子曰若達便是堯舜氣象聖人無一事不從道理出來如禮樂刑政皆道也後世道不明禮樂刑政與道判為二物故禮樂廢而刑政倚於一偏也凡事有則循其則即理也裁而制之則為法度法度立則弊可革然行之則在得人久或弊生又可變而通之以適於宜為治之法當因事勢而裁以天理近觀三禮皆是從天理上裁制出來蓋聖人之心理一而用殊天下之事萬殊而一本故許多制度節文皆是聖人胸中流出天下後世取以為法學者須當由是以窮理茍非其人道不虛行縱有良法美意非其人而行之反成弊政雖非良法得賢才行之亦救得一半人法皆善治道成矣處天下事須得其總要如君擇相相擇諸司之長長擇其僚自然得人得人則天下事自理此實理之自然非強安排如太極生兩儀兩儀生四象四象生八卦以至生千生萬蓋道理是如此聖人只倚他這道理做非聖人所造為也封建乃古聖人擇賢以分治公天下之心也使生民各有主主各愛其民上下維持以圖久安至善之法天子又有慶讓錫命征討之法以統御之及天子無道然後乃敢縱恣吞併然亦不敢不自愛其民也若不愛其民則衆不為用故中才之主亦知愛其民以固邦本惟昏愚之甚然後肆其虐又必有仁賢智勇起而救之湯武是也其曰兼弱攻昧取亂侮亡則虐民者必更之立賢主以養其民周衰聖王不作無有能伐暴救民者及吞併已盡秦以天下為己私乃立郡縣以為治此亦勢使然也蓋以秦之昏暴固不能行先王之政雖行封建未必得人以主其國養其民民必不服國必生亂借使能服亦以土地人民自私因秦之暴而叛焉故曰茍非其人道不虛行德必如禹湯文武方能行之又必得仁厚有德為諸侯方能君國子民以承天子休命論者以為封建不可復誣矣但郡縣得人亦可為治固不必封建也今人多言古道不可行於今此乃見道不明徇俗茍且之論古今之道一也豈有可行於古不可行於今但古今風氣淳漓不同人事煩簡有異其制度文為不無隨時斟酌而損益之若道之極乎天地具于人心者豈有異哉不能因時損益以通其變者正為道不明也孔子所謂百世可知者豈欺後世哉故明道十事皆言非有古今之異者也明道所論十事條理詳備先王之法盡于此矣當時若能用之從容三代之法可復有公天下之心方做得公天下之事封建諸侯與之分治是也秦始皇以私心得天下以天下為己之私物豈做得封建事又慮封建之後諸侯各專其土地人民難以制馭與李斯尋得一箇建郡縣底法度來行如以身使臂以臂使指無不聽順免尾大不掉之患以為可以傳之無窮故肆其惡無所忌憚不二世而亡殊不知封建之法行各國諸侯把持得緊各愛其人民土地猝難變動因可夾輔王室此法不行故陳涉一起蕩然無制此固是秦無德不行封建使行他亦不能得好人去做諸侯諸侯背叛他亦做不得天下主故封建之壞亦是世變至此不得不壞郡縣之設亦是事勢至此不得不設但建國則根本固難變動然統治之法又不如郡縣易行茍得其人二法皆可也封建諸候先儒以為當復者又有以為不可復者以為可復者使民各有主以賴其愛養區域周密無天下土崩之患以為不可復者恐世襲封爵或多驕淫害民或據有土地人民天子難制易為亂叛故無一定之論愚嘗思之惟孟子有言徒善不足以為政徒法不能以自行程子曰必有關雎麟趾之意然後可以行周官之法度則此法非聖王不能行之審矣然井田之法所制民産以養民雖中才之主皆當勉力行之故孟程張朱皆急于井田緩于封建或曰設行封建當依孟子言百里當依周禮言五百三百曰但當百里曰郡縣可行井田乎曰可曰王莽何以不能行曰王莽以小人竊君子之器覆亡不暇能行王政乎後世以智力取天下其治天下乃把持制馭之術未嘗有愛養斯民之誠心如何行得封建其所封子弟功臣皆是箇享富貴之人其害民叛上必矣故後世封建非理不可行乃勢不可行秦始皇李斯言立諸侯是更樹兵張子房説漢髙德業事功俱不及周武王如何封得六國後是李斯子房見得事勢透凡正官須要才德兼全方可為佐二官可截長補短用凡佐二官必須命於朝僚屬則令長官自擇六部則一正三副命于朝監司則一正二副郡則一正一副命于朝邑則惟正官命于朝其餘僚屬大者薦聞小者自辟如此則君相事亦簡亦不患不得人蓋君子小人各從其類長二君子必不肯用小人為僚屬官不得人雖多何益非但虛費祿食必生事擾民朱子曰上之人曽不思量時文一件舉子自是著急何用更要教設學校却好教他理會本分事業朱子曰今教官只教人做科舉時文若科舉時文他心心念念要爭功名若不教他你道他自做不做何待設官置吏費廪祿教他做也須是當職底人怕人不識義理須是要教人識些如今全無此意天下古今只著一箇利字害了天理秀才讀著書便要求中科釋子誦著經便要求一箇福禪子坐著禪便要求自己一箇快樂那里尚有天理或問天下之事大正則難如學校間可小正朱子曰大處不正小處越難正明道教養選舉法簡易明白復古得賢如反掌伊川學制則因時制而裁酌之未免于課卷文字朱子貢舉議則欲救一時之弊然終是費力蓋半夾界事最難做須得君相有力量一依先王之法斟酌而行之自然不費力明道先生曰古者政教始于鄉里故欲復族黨比閭之法朱子曰古人比閭之法真箇能行禮以帥之民都是教了底如一大川水分數小川去無不流通後世有聖賢作必須法古從底做起始得古者鄉舉里選法非但可以為朝廷得人又可盡教養激勵漸磨之道閭族鄉黨既勵于德行道藝則風俗安有不厚教化安有不興人才何患無成朝廷必得人為治也得賢之道須如周禮賔興明道選舉方無所遺其次莫如搜訪薦舉如舜舉于厯山伊尹舉于莘野傅説舉于巖下太公舉于渭濵孔明舉于南陽皆因求訪薦舉而得蓋不世出之才道髙名重茍訪求之無不可得但恐才德未著者須用賔興選舉法方可無遺非但無遺又有作興奬勵之實使賢才日盛今之科舉非徒不能得賢反廢人進修之實或謂程明道朱文公皆出于科第豈可不為得人曰使科舉果可得賢則程朱為狀元矣茍不能行成周鄉舉里選法只行薦舉法亦可得人今之科舉全無用處薦舉雖不及鄉舉里選猶可激勵人自去進善但不如周官教養振作之詳備若只以文詞取士使人日趨於纎巧薄劣是蔽絶其為善之心使之流于不善也古人以德行道藝教人即以此取士又從鄉里教起故取士用鄉舉里選之法漢猶近古用孝亷科賢良方正科舉士是尚德行用茂才科經義科舉士是兼才學此儘好但不若周禮賔興之盡善後世純用文詞取士空言無實進士是隋煬帝做起殿試是則天武后做起朱子言宋之銓法為挨排法科舉為信采法言非推用賢才之道朝廷不以德行取士天下學校根本先壞了非惟不能成人才又壞人才吾在紹興與朱綖説今之秀才有六七分天資及入學校年久又壞了一半只有二三分天資綖以為然朝廷以文章取士故士子亦心心念念日夜去擬題目作文章故學官皆間了設若朝廷以德行才能取士則人必皆奮勵以進其才修其德又何患人才不興風俗不美故乾綱一振萬類皆從人存政舉又何難哉以文詞取士不過空言無實豈能得人不若推訪論薦乃能盡衆人公道其得人必勝如詞科必欲教養推選人才使無遺逸須如周禮司徒明道學校劄子今學校之政全無可觀教養之法已廢間有些好人出來皆是天資自美若不入德行一科學校全整理不得五倫萬古不易之道經界萬古不易之利人才萬古為治之本法度則可因時損益昔見䇿問有曰學所以明人倫顔路在廡不應顔淵在堂曾子子思在堂不應曾晳伯魚在下答者只曰以傳道為重此亦不是道豈有重于父子者子在上父在下安乎禮可以義起宜别立一堂于聖殿之後以祀顔路曾晳伯魚乃為正也祭祀所以崇德報功合升程朱于四配之下以成七配若禮殿狹難設位則十哲乃世俗論可列在廡只用顔子配享曾子至朱子六人升配于堂庶幾允當夫程朱之德無愧顔孟功亦不在顔孟之下葬可以無槨無螻蟻之地則可江南多蟻必須槨依家禮用灰隔尤妙貧甚不能具者用石灰炭末三四石用小石子或石屑和拌以周棺可也不然必為螻蟻所食聲是天地自然之聲律度量衡皆起于此而數在其中黃鍾之律容秬黍一千二百是聖人先以聲定律之管後以秬黍積之知其然然後可因是而造度量衡非是以秬黍制律況地有肥瘠年有豐凶黍因有大小安可執以為定惟程子謂止有秬黍彼時適當此數故以定律管非律由秬黍制也今天下第一無用是老釋第二無用是俗儒所作詩對與時文如農工商賈皆有用處皆有益于世如農之耕天下賴其養工之技天下賴其器用商雖末亦要他通貨財如老釋與俗儒在天下非但無用又害了人心昔見一俗儒作詩賀人夀過數日其人將去糊窗壁此儒喫惱吾曰也只好糊窗子更好作何用詩以理性情文以載道義又何咎焉乃不去身心性情上理會所以無用也人著書才有一毫為名便是悖逆天理古人著書皆不得已如耒耜陶冶生民所賴菽粟布帛生民所急若無益于世著之何用況詭誕浮華害于世者乎某在佑聖觀見壁間題曰逆則處處生顛倒順則頭頭合自然居仁加兩字曰逆理則處處生顛倒順理則頭頭合自然作詩文要巧便離道只要道理條暢敘事詳明觀四書六經可見明道學校養士劄子就本原上做故末自正朱子私議從時弊上救便難天下人才風教繫于朝廷當今以科舉文辭取士多少英豪俊邁壓從那邊去此風浸久益盛隋焬帝開此端王教不行多由于此天下之田地足以供天下之衣食天下之山澤足以供天下之材用但力要勤用要節取要時而已井田什一漢雖三十稅一然豪強兼併貧人盡力耕種富者分去一半是十分而稅五漢文帝盡赦田稅貧民未嘗受惠荀悅之論是也王莽欲行井田然篡逆之賊君子不為用小人在位吏緣為姦騷亂天下蘇氏葉氏馬氏皆以為真不可行誤矣唐太宗口分授田遂致貞觀之治若聖王得人任職舉井田而行畫成區數隨髙低長短濶狹每區以百畝為率每畝以百步為率分上中下三等上等八口九口中者七口六口下者五口未至五口或過乎九口别行區處或曰田之數不可益人之生無窮只恐將來人多田少養不給如何曰天地間氣只生得天地間許多人既生之必能養之將海內之田區畫已定籍記天下人口之數而加減之只要均平不拘多少多則每區十人亦可少則每區四五人亦可當以田為母而區畫已有定數以人為子而增減以受之天下之衣食盡出于農工商不過相資而已故程子舉先王之法合當八九分人為農一二分人為工商今以數計之工商居半又有待哺之兵及僧道尼巫師祝富盛之家皆不耕而食機織本女子之事今機匠以男為之耕者少食者多天下如何不飢困宜自百官士人之外止將一分人作工商以通器用貨財有無其餘盡驅之于農既盡生財之道又免坐食之費四海必將殷富矣古者民有九年之食則水旱凶災無患是謂太平今無一年之食多只喫得半年又去生貨這半年食始能接新榖若有水旱便難存活井田之法不行田地多被富豪有智謀者用銀榖買而兼併之愚民常少衣食要天下富足須要使人人去耕又要使人人有田耕今天下不耕而食多于耕者如何人不貧窮天下之民所以貧困者雖因田地不足然亦非一端或因賦斂重或力役繁或用度奢侈或遊手者多或水旱蟲蝗或坐食者衆今工商多而農少亦貧困之一端也若要人民殷富國賦不乏須分田置井務農重榖輕省徭役使民得以盡力耕耨去冗食之官與坐食之兵在上者躬行節儉限貴賤之等變奢靡之俗然後儲積可廣雖遇凶年民無飢困矣凡飢荒之時在上者便當惻怛憂閔以救民為急發倉廪以濟之方可固結民心不怨上思亂厯觀為盜者多是遊民懶惰者為之強者為強盜弱者為竊盜故先王必禁遊民使之有業效勤為先也天下只有公私義利兩端周官泉府買貨之滯于民者及民之急于用則出而賣之皆所以便民其心公其事義後世有市易和買皆私利于己古有平糴榖賤則糴之以厚農榖貴則以原價糶之以救民皆公而義後世則至于和糴強配皆私而利君道在養民井田不可不復古教民之道在學故學校當復古兵民既分食者衆生者寡故寓兵之法必復古三者復古其餘則隨時斟酌以適宜可也古者民即軍無事則耕有事則戰後世既無寓兵于農之法遂有長征兵今又有世襲軍故有民户軍户古者三時務農一時講武此聖王寓兵于農萬世之良法今既不行此法亦當行屯田法以免坐食之費今百官祿薄百姓窮困皆因養待食之兵屯田宜在近便處立屯如戍兵就在近邊之地耕屯郡兵就在近郡之地耕屯每一兵撥田一區其入可食六七口免其糧稅使自食其榖又可以養父母妻子春夏秋則就在屯所少暇小習戰法冬則入邊城大講武備其田皆官府措置如此則非惟可以免坐食之患又免漕運則國自富民自足矣王介甫保甲法非不善但小人為官虐害百姓訓練頻數有違農時騷然成擾民不堪苦若得人行之因農隙田狩以講武事有何不可兵不可妄動必誅暴伐罪乃可出故三代以前出師皆有誓所以聲明所討之罪以一我三軍之心曉我三軍之意齊其號令嚴其紀律彼之君民既知已罪則氣自喪心自離故仁義之兵理不可敵後世多忿欲之兵無詞可執或有詞可執者亦因天理不明不能剖破姦雄亂賊之心事罪惡以昭告軍民遠近以壯我師之氣以服敵人之心是以苦于戰鬬而不足以正天下聖王之兵有征無戰又無許多詭計者非是迂濶是他師出以正仁義素孚于人心行陳整肅號令嚴明兵士奮勇效死敵人望而畏服又吾之所以征之者非欲殺彼之民乃誅其害民者彼民豈肯願與我戰此一箇天地生物之心無物我彼此之間逺近華夷莫不感戴豈真若宋襄于泓之戰迂愚無道反辱身敗師乎孫子曰兵詭道也謂詭則不可用竒則有之或倉卒用師或敵人強盛有不得不用竒也終是用竒必有殺傷之患非聖人心也但恩信不及所以制服其勢者不得不如此所以殺其人不若制其勢制其勢不若服其心古之聖王心同天地其生物之心敵國皆知之雖或誅暴救亂不得已而興師彼之人民皆心服誰肯與我為敵此是箇大兵法人不識只有孟子識得透黃石公素書始終只是一箇私或曰素書先説道德仁義禮如何謂之私曰道德仁義禮非私石公以私見窺之私意用之故私然所窺所用非真道德仁義禮也兵者聖人不得已而用之為誅暴禁亂弔民伐罪而設主之須是仁義之人智勇可用于暫時亦利害相半兵以仁義為本當先嚴紀律設謀制勝在後兵雖主之以仁義亦須法律謀議具全方可用兵雖曰威克厥愛然愛行乎其中不知此則必有敗亡之禍無以全其生故仁義之兵愈嚴兵法言須使兵士畏將過於畏敵此言雖是亦偏須更使愛將如愛父兄也然此是説家計事須使敵人亦知畏愛方好問羊陸何如曰羊祐是私意故程子以為敵國相傾之謀問聖賢如何曰聖賢兵以義動自不用許多機阱所謀者欲其歸於義也非私也若朝廷君相不得其人雖有善戰之才不可為之戰也雖使戰勝終必敗亡以寡擊衆者只是這邊謀議定那邊謀議不定這邊人心奮勇那邊人心懈惰這邊隊伍整那邊隊伍亂再無别法天下事不善處置則小變成大鄧茂七葉宗流黃蕭羊若當初處置得宜一縣尉足以制之及發也茍得其人郡兵足以制之及其猖獗費傷許多兵力若王道既行仁義既興則民安物阜賢能在位百邪俱息自無此等事以此思之王道不行太平難致漢唐宋僅得小康下此皆危亡之國也故非陳勝能起兵秦自起也非黃巾能為亂漢自亂也非黃巢能為亂唐自亂也非紅巾能為亂元自亂也兵主于誅暴禁亂安民故以不殺人為本其殺人者不得已也此亦是以生道殺人殺降最不好惡莫大焉一則殘忍害仁二則阻人悔過絶人生路三則適足以堅敵人之志殺降夷族屠城此三者至不仁至慘酷古無是事五刑之不載先王所不行也擒盜賊明賞罰為先昔臯陶明象刑而三苖服刑賞既明功罪既著能否既分則人心自奮勇氣自倍賊勢自消此其本也設機制勝在臨時朱子曰今盡力養兵常有不足之患自兵農既分之後計其所費則是無日不用兵也愚謂若寓兵之法不行且興屯田法可省坐食之費屯田之法須如古者井田官買田為之分成區域每區所入可食六七人令軍人移家就佃選賢能為之師修明戰法敦尚仁義有事則戰無事則耕非惟可免饋運可以漸復井田古人七家出一兵是遠征如輔衛國家則人人皆當盡力人人皆當講武故田與追胥竭作先王之兵在于救民伐暴禁亂保邦後世之兵在于利己殺人逞忿快欲感化者聖王為治之本刑賞者聖王勸懲之具馭衆之柄也天下之大生人之衆雖逺近賢愚不等然莫不本于一理聖人在上盡此理于己安有不感化者哉然善者爵而賞之惡者威而刑之亦此一理中之散而萬殊者聖人豈有意為之哉理之當然也然刑當乎理衆莫不懲賞當乎理衆莫不勸故此又為馭衆之柄也兵刑皆聖人不得已而用之德政未孚頑暴未化只得著如此處置故二者皆極其矜恤戒懼君子不待刑而常存戒懼故自能立教小人則必待刑方有所戒懼故刑所以弼教今武官世襲軍人世襲兵安得不弱如祖父智勇兼全可為武官子孫或愚弱可供職乎祖父壯健可為兵或子孫小弱亦可為兵乎只合文武合一兵農合一遴選賢能為之主治無事時修立教化務農講武有事時則簡練精壯者以為兵今因兵食廣浮費多以致官祿薄再立均徭皂𨽻月錢亦是加賦之意居業録卷五
