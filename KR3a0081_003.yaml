body:
  text: 居業録卷三明胡居仁撰聖賢第三孔子教人忠信篤敬程子教人整齊嚴肅若著實做得自然心安體舒道理明瀅今人多是無頭腦之學聖人教人只教以忠信篤敬使學者便立得箇根基本領學問可次第進孔子教人便要使人有諸己學為己方有着力處窮理則達力行則有諸己學不為己雖有顔孟之聰明亦不濟事孔門之教只是求仁而堯舜事業盡在此孔門學者以求仁為要真是好是教他在最切要處求非但自己一身好與天地萬物血脈便相貫通孔門以求仁為要程門亦然仁者心之徳求仁所以全其心之徳心徳既全在我則有自然之生意在天地萬物則亦流通無間故人之於仁最為親切入聖人氣象於此最近如瓜仁桃仁杏仁此亦善形容仁字葢物之生意盡在於此某嘗愛喫瓜仁桃仁喫着便有仁底意思求仁必先主敬者當體便要存得本心本心既存則生理自在曾㸃雖見得道理分明然下學工夫有欠故無以有諸己若顔子便拳拳服膺邵康節見得道理分明又作弄得熟反成玩侮天理釋氏未能真見但作弄自己精神顔子最好處是得一善則拳拳服膺而弗失孟子最好處是善端之發便能擴充以至其極今人見好事不肯做故不濟事若因善端之發不肯放過直做到底真箇難及便是顔孟復生論徳則顔子優於孟子論才只一般顔子之才密孟子之才大孟子才髙在心性源頭處理㑹曰存心養性曰求放心擴充四端之類其曰操曰存曰養曰求曰擴充孟子工夫便在此下手非有孟子天資便無可依據故孔子只教人忠信篤敬博文約禮便有依據持循而心性工夫亦無不盡矣河洛之教實祖孔子故主敬主一荘整嚴肅整衣冠齊容貎格物窮理益詳益盡學者亦不患無依歸下手處矣孟子求放心集義養氣内外本末交盡也孔子以下才莫髙於明道才莫大於孟子孟子之髙與後世之髙不同孟子英氣渾化未盡故有此跡如泰山之髙根脚甚大後世之髙下無根基無實理空自髙大自孔孟以後道莫大於程朱故其所著作經傳實能發明聖學切於學者今有一等溺於空虚者好簡㨗而厭其煩務記誦者反惡其多務訓詁者不過借以為口説惟實窮理力行者能識其精切詳明也自孟子後千四百年無人見得此道分明董子見其大意孔明天資有暗合處韓退之揣見彷彿至程朱方見得盡自朱子後無人理㑹得透徹真西山庻幾荘子邵子甚大若論反正之漸荘子就規矩凖繩便到邵子邵子規矩凖繩至可到孟子孟子完養純熟可到孔子孟子程子不曾枉做了工夫如孟子擴充四端程子主一無適真在心地上做孟子朱子邵子天資俱極其大惜乎邵子稍偏而未盡下學工夫孟子朱子盡下學工夫所以能充實其大也周濓溪於道理本原處見得分明精切故異端害不得邵康節於先天圖見得天理進退消長循環極分明故異端惑不得然觀其所為有些意思張横渠工夫切實方脱異端然觀其所見亦有些意思周子有主静之説學者遂專意静坐多流於禪葢静者體動者用静者主動者客故曰主静體立而用行也亦是整理其心不使紛亂躁妄然後能制天下之動但静之意重於動非偏於静也愚謂静坐中有箇戒謹恐懼則本體已立自不流於空寂雖静何害周子不由師傳黙契道體是他天資髙然開示下學工夫使聖學門庭曉然可入二程全之邵康節説老子得易之體孟子得易之用是體用分為二矣體用一源豈有得其體而無其用者哉豈有無其體而有其用者哉老子體用皆無孟子體用皆有老子清净無為是易之體已無矣絶滅理義是無其用也孟子存其心養其性立其體也集義養氣擴充四端達其用也康節本心清明造化之闔闢往來消長閲之熟而契之深故其所言無非此理卷舒作用無非此事然亦有侮玩不恭之意張横渠言太虚不能不聚而為萬物則可言萬物不能不散而為太虚則不可聚則生散則盡物理之自然豈又散去為太虚者太虚亦不待萬物散而為也横渠十五年做恭而安不成是横渠持身謹嚴少寛裕温柔之氣亦可見其工夫親切但未至自然終是些病痛韓退之極聰明志大才髙故程子言自孟子後能将許大見識尋求才見此人如原道等篇亦窺見聖人之用論性亦過於荀揚惜乎未得聖賢用功之要故用力雖勤多在文字言語之間自任雖重於義理本原終未有得其以博愛為仁行而宜為義雖能窺見仁義之用於仁義之本體有所未覩也昔孔子言立人之道曰仁與義則人之道乃仁義之所為以見人之身全體是仁義命之於天全之於我而博愛與行而宜不足以盡之也子思曰仁者人也義者宜也以見仁即人身之理義即其理之宜也孟子曰仁人心也義人路也以見人心全體是仁義乃當行之理程子言心如榖種仁則其生之性則益親切矣朱子曰仁者本心之全徳是舉仁而義在其中即程子所謂專言之仁也又曰仁者心之徳愛之理義者心之制事之宜是兼體用而言也葢孔子子思孟子程子之言極親極切朱子之言尤詳尤備惜退之未覩乎此韓退之説詩書勤乃有不勤腹空虚則是以記誦為主其説道理是其聰明揣度出來王介甫言讀書萬倍利是以功利為主其説道理亦是聰明想像出來皆非真知也然介甫利根尤深故其為政只被利字做出許多不好事明道先生本領純察理精涵養熟故不動聲色天下之事自治涵育薰陶而天下之心自化孔子以下第一人也顔子明道隣於生知明道天資髙本領純粹其學自大本上流出於細㣲處又精盡明道才大徳盛當時入朝建言若依他做三代之治可運於掌惜乎神宗惑於王安石功利之説而不能用也當時神宗甚欲有為亦甚聰明安石亦才髙故明道俱要格其心已被明道感動了明道雖去神宗眷眷懷之安石亦言感賢誠意當時被張天祺等攻擊太過遂不能從故明道深惜此機㑹以為兩分其罪明道十事他便是要舉一世而甄陶之此只是大綱目若下手做時想又精密明道行状云狡偽者獻其誠暴慢者致其恭聞風者誠服覿徳者心醉其為政也道之而從動之而和不求物而物應未施信而民信此聖人境界上事聲色之於以化民末也明道言邵堯夫之學難以治天下國家便是他放曠不可為法於天下惟修己以敬者可致篤恭而天下平明道作康節墓誌言七十子同尊聖人所因以入者門戸亦衆矣是未嘗以聖學正門庭許他言先生之道可謂安且成矣是康節自成一家程子言康節空中樓閣朱子言其四通八達須實地上安脚更好上蔡記明道語言既得後須放開朱子疑之以為既得後心胸自然開泰若有意放開反成病痛愚以為得後放開雖似涉安排然病痛尚小今人未得前先放開故流於荘佛又有未能克己求仁先要求顔子之樂所以卒至狂妄殊不知周子令二程尋顔子之樂處是要見得孔顔因甚有此樂所樂何事便要做顔子工夫求至乎其地豈有便求自己身上尋樂乎故放開太早求樂太早皆流於異端程子天資髙其於義理不用甚窮索只優游涵泳以得之雖曰反求諸六經然亦不甚費力自孔顔以下所造精粹未有及之者程子本原義理固受於周子然下學階次精㣲曲折而全體聖人多所自得者故義理血脈固在於周子而承襲孔孟以繼堯舜文武之緒直以程子當之程子發主一之論與易齋戒以神明其徳相同書曰惟精惟一孟子曰必有事焉而勿正心勿忘勿助長皆此意也程子發明心有主一句真是學之要此便見虚中有實大本卓然彼徇於功利者雜擾而無主溺於空虚者寂滅而無主只收斂專一便是有主之道朱子所謂自作主宰自操自存今有一等學問常照㸔一箇心在内裡乃異教反觀内視之法其無主一也程子在主一無適上做工夫所以其心純熟精明以造夫聖也程子曰凝然不動便是聖人理定也程子有篤恭而天下平氣象程子教人静坐所以救學者之偏亦所以定其紛擾雜亂之心程子曰識得此理以誠敬存之而已最是如曾㸃天資髙所見大其言志處髙邁不滯於迹已勝如顔子但不如顔子能誠敬存養既不能存養併與所見者而失之矣此顔子所以進於聖曾㸃卒歸於狂也上蔡言明道先使學者有知識却從敬上涵養亦是此意但説偏了此言識得後須更存養豈言未識前不涵養程子曰有主於内則虚是内裡潔净明瀅無昏雜與無主而虚不同如人家主人在内雜亂人不入故虚異端言虚只是空屋無人矣程子言横渠門人守禮節沒滋味如喫木札相似言其少窮理致知工夫於理不深造非以守禮為不善也茍能於禮節中深體密察而謹守之則知行兩盡此理實有諸己矣程子言敬則無己可克朱子言敬則仁在其中矣皆一意也程子之學是内裡本領極厚漸次廓大以致其極朱子之學是外面博求廣取收入内裡以克諸己譬如人家程子是田地基業充實自然生出財糓以致富朱子是廣積錢糓置立田地家業以致富用力雖異其富則一也但朱子喫了辛苦明道固容易伊川亦不甚費力程子曰敬下驢不起只是謹密畏慎底意朱子在孝宗時又與程子時不同程子之時只要修舉先王之政南宋時大段弱削若不復仇討罪則三綱不振人心沮喪而國非其國矣故修徳用賢練兵舉義此處做得起家國可振王道可行朱子行状學問道理本末精粗詳盡吾每令初學讀之明道行状形容明道廣大詳密然渾化純全非工夫積累乆地位髙者領㑹不得吾每欲學者先讀朱子行状有規模格局方好讀明道行状心專則不放故程子主一為敬容荘則心自一故朱子荘敬涵養朱子直是勇窮理便直是窮到底作事直是做徹底朱子體段大相似孟子但孟子氣英邁朱子氣豪雄孟子工夫直截朱子工夫周遍㸔來朱子只任勇猛做向前去更不退縮朱子直是豪氣朱子註四書詩傳先訓釋文義然後發明其正意又旁引議論以足言内之意或發明言外之意此深得釋經之法參同契隂符經朱子註之甚無謂使人入異端去調息箴亦不當作參同契隂符經皆能窺測造化之妙盜竊造化之機但不合他将來濟一身之私故違乎聖賢大中至正之道反為學者心術之害參同契欲闗鍵耳目口三者使耳不用聰目不用明口不以言以完養神氣於内此但能養一身之私而棄天下之理世之自私者多好之故害道尤甚隂符經之言竒怪葢聖王之道不明竒怪之士欺世之無人縱其異説而無所忌憚説者以參同契隂符經與易同用非也易雖精㣲而坦夷明白中正廣大周遍詳悉非二書可擬人以朱子調息箴為可以存心此特調氣耳只恭敬安詳便是存心法豈假調息以存心以此存心害道甚矣朱子曰静而常覺似説重了些子只説常惺惺常精明則可説常覺便有心分為二底意思朱子於中庸或問言至静之時但有能知能覺者而未有所知覺也此為至論朱子曰人纔敬時心便在身上了又曰敬則萬理具在禮者天理之節文人事之儀則朱子説得盡禮義人心固有朱子去逺而小學家禮好之者甚衆今被陳公甫輩務為髙逺厭禮節之卑近煩細不屑為之可勝嘆哉范文正公作事必要盡其方曰為之自我者當如是其成與否則有不在我者雖聖賢不能必吾豈茍哉此范公有脗合聖賢處故其進退出處超然無累行藏卷舒過於他人范希文之正氣不待養而剛大是天姿正大非學力也若能深造則王佐矣楊龜山言王荆公離内外判心迹使道常無用於天下此最説出荆公學術偏處揚子雲之言沈晦見道不明也辭不厲所守不確也韓退之説上下之交只説得一箇事勢成得一箇私意天理之當然則不知也陸子説道理多不條暢説仁説心亦偏枯其作敬齋記亦踈葢形容敬中工夫不出可見其學之偏象山天姿髙力量大用力甚切但其見理過於髙大存心過於簡易故入於禪其自幼與伊川不合者伊川收斂謹密其言平實精確象山必有凌虚駕空之意故聞伊川之言似有傷其心其晚年身在此處能知民間事又預知死期則異學無疑其門人揚簡以問答之間忽省此心之清明忽省此心之無始末忽省此心之無所不通此非儒者之傳授其行状言四時之變化先生之變化也天地之廣大先生之廣大也鬼神之不可測先生之不可測也亦過髙之言矣每讀象山之文筆力精健發揮議論廣大剛勁有悚動人處故其遺風餘烈流傳不冺然細推之則於聖賢細密工夫不甚分明故規模腔殻雖大未免過於空虚也東萊先生謂所以詐為良心又謂天理存於人欲之中所論太巧而鑿葢東萊聰明才髙多為過巧之論反失了平正道理葢人之良心天理根於秉彛之性雖小人喪滅之餘終有滅不得者但其為人欲所勝耳東萊又謂有事是而心非者此説固善然論其極則内外一致本末一事未有心非而事是者荀林父伯宗不能陳示天理之當然不過為謀利計功之私謂之是可乎五霸假仁義事雖似是然謂之假則不是矣許魯齋天姿純正所行自不茍惜乎未能深造呉草廬甚聰明早年甚英鋭惜乎力行未能終其學鮑魯齋作天原發㣲雖欲窮深極㣲只是不能有諸己馬氏作文獻通考雖欲博通古今但雜而不精胸中元無權度故斷制多差荘孔暘觀其詩只是一箇豪曠之士此風既成則天下學者皆流於曠濶狂妄之地為害亦不細黃憲天姿甚美當時士大夫無不心服其徳量但未見其為學工夫又未見其言論道理故今無以考究所造之淺深想只是姿質純粹度量深廣風致髙邁底人所謂質美而未學者世道之所賴有二一則降衷秉彛不可冺滅二則頼聖賢遺訓尚存有志之士尚可因以感發用功無此二者生民之道熄矣後世教化全不可恃聖賢教人恕上求仁恕則物我之私不立天理流通也天地聖人只一箇誠私意間處便不誠誠實理也不可以人偽雜之君實雖無偽然與聖人之誠不同者於實理未盡也乃無私之私無偽之偽也子路之欺亦然聖人只在天理上行無所損益聖人與賢人之分只是一箇生與熟間斷與不間斷識得如何未熟如何間斷從此勉勵不息此是希聖工夫乆而聖可至矣聖賢見道分明故於天下之事只是順理以應之未嘗用一毫智計之私然動中機㑹自然順治雖非智計而智計在其中後世智計之士雖極其智計終是見理不明㑹錯了付此身於天理中不作聰明不以造為撓之即堯舜氣象人皆可以為堯舜是吾心之理與聖人一也吾之理既與聖人一又何聖人之不可學乎不學者皆自棄也今人有聰明皆不㑹用只去雜駁上學或記誦辭章或涉獵史傳或泛觀諸子百家用心一差其聰明反為心害其聰明反為不聰明矣善用聰明者潛心積累先從小學大學近思録論語孟子精思熟究體驗得聖賢心事義理工夫瞭然得之於心然後循序漸進博學羣書王勃等聰明與聖賢聰明不同者是做向外靣去故適足為心之害也學只是修身功業是修身之效不可以功業為心以功業為心非惟失本末先後之序心亦難收程子曰有顔子之徳自有孟子之事功天下人只一箇心如克己在我天下歸仁豈非同此心乎人心不同處只是私心因有所蔽而然也學者先當理㑹身心此是萬事之根本學要來身上做慊于己者不使萌于再此真能修身者進于聖人不逺矣孟子中庸多開示道理本原使人知所信向方肯下工夫大學論語就教人直截做工夫聖人教人手段與賢人手段不同聖人徳盛人肯信向就教他做工夫自能下學上達到本原上上下俱了子思孟子先将義理大原與效驗都開肚破腸説了方能使人踴躍去做工夫但中庸工夫又更細密切實讀書一邊讀一邊體驗做做得一兩處到身上來然後諸處亦漸凑得來乆則盡凑得到身上來此則是大賢有聰明識義理不能持守而喪其本心者多矣雖曰知之未真然皆因氣偏欲汩故也此持養之功所以貫乎學之始終不可須臾舍也今人有小可才能也幹些事聖賢道理充足如何不做出事來達而在上如堯舜文武窮而在下如孔子得時行道如伊傅周召不得時如顔孟程朱其徳業事功侔乎天地以此知黃憲之流只是一介善夫也正其義不謀其利明其道不計其功學者以此立心便廣大髙明充之則是純儒推而行之即純王之政人做得切己工夫自無許多閑思慮當然處即是天理盡天理不以一毫私意智力撓之便是堯舜氣象道理只是這箇道理功名事業是偶然萬物各有自然之理聖人只是順之不曾加得一毫理明後又持守堅固力行純熟此是大賢聖賢只依天理做事所以極其大與天地參霸者以智計處事便小欲為天下第一等人當做天下第一等事做當今一箇好人須壁立千仭道不行百世無善治學不傳千載無真儒然欲道之行治之善非真儒不能古人老而徳愈進者是持守得定不與血氣同衰也今有才氣之人到年老便衰是無持養之功也學至聖人地位方了一生事一息尚存此志不容少懈古人云葢棺吾事畢又曰存吾順事沒吾寧也居業録卷三
