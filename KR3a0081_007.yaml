body:
  text: 居業録卷七明胡居仁撰老佛第七楊墨無父無君老佛人倫物理滅盡非楊墨比也老氏談道德然以虛無𤣥妙為道德適足滅其道德佛氏言心性然以寂靜空豁為心性適以滅其心性老氏雖虛無然亦終不奈這道理實有何故滅不盡禪家素淨打坐只消一箇空字把天下道理滅迹掃盡老氏說道德釋氏說心經故天資高者往往從之老氏以𤣥妙為道德不從日用常行處體察佛氏以虛靈為心性而不知五常仁義禮智信所以雖似見其倣佛而實非有見也老氏之學是見得一箇物事在窈冥昏默中遂指為太極釋氏是見得自己一箇精神知覺在光明不昧中遂指為心性然皆非真物老氏以有生于無是不識前一截佛氏曰空前一截後一截俱不識故佛氏背逆顛倒甚于老氏太極之虛中者無昏塞之患而萬理咸具也惟其虛所以能涵具萬理人心亦然老佛不知以為真虛空無物而萬理皆滅也太極之虛是無形氣之昏塞也人心之虛是無物欲之蔽塞也若以為真空無物此理具于何處體用一源非二事人言老佛有體無用此不然豈有有體而無用者老佛空其體而絶其用禪學工夫蓋緣體不立故絶去外物以求虛靜使本體不昏譬如伐去其木之枝幹而專培養其根伐之之久則外之生意既絶內之根本亦枯所以培之者適以速其朽壞故禪學滅絶天理最速且盡老氏次之功利者又次之也世之愚者莫如老佛至愚之人也曉得箇天地父母妻子也曉得有箇己身今禪家以天地為幻妄己身為幻身離父母棄妻子雖天地六合之大也曉不得故言一粒粟中藏世界陳獻章又要塵微六合豈非愚之甚乎老氏要長生不死佛氏生也不要死也不要尋得一箇真身真性不生不滅老氏既說無又說杳杳冥冥其中有精混混沌沌其中有物則是所謂無者不能無矣釋氏既曰空又說有箇真性在天地間不生不滅超脫輪回則是所謂空者不能空矣此老釋之學所以顛倒錯謬說空說虛說有說無皆不可信若吾儒說有則真有說無則真無說實則真實說虛則真虛蓋其見道明白精切無許多邪遁之辭老氏指氣之虛者為道釋氏指氣之靈者為性故言多邪遁以理論之此理流行不息此性禀賦有定豈可說空說無以氣論之則有聚散虛實之不同聚則為有散則為無若理則聚有聚之理散有散之理亦不可言無也氣之有形體者為實無形體者為虛若理則無不實也問老氏言有生于無佛氏言死而歸真何也曰此正以其不識理只將氣之近似者言也老氏不識此身如何生言自無中而生佛氏不識此身如何死言死而歸真殊不知生有生之理不可謂無以死而歸真是以生為不真矣問佛氏說真性不生不滅其意如何曰釋氏以知覺運動為性是氣之靈處故又要把住此物以免輪回愚故曰老氏不識道妄指氣之虛者為道釋氏不識性妄指氣之靈者為性老子最姦待人處事皆要處其下居其後非真有謙遜自卑之心蓋見剛而居髙者多危僣而居前者多凶又見谷之卑下虛空衆流之所趨故欲為天下谷而專一守其卑下居柔處懦其心實欲髙于人先于人勝于人也其心詐其機𤣥其穽深為害甚酷後世用兵者多祖之以取勝流禍不窮也莊周所謂自然非循乎理之自然乃一切棄而不管任其自然所以曠蕩不法禮樂刑政皆無所用反謂聖人不死大盜不息欲剖斗折衡使民不爭天下只有一箇是非順理則是背理則非莊子却要忘其是非不加省察儒者只尋箇是處老莊之說最妄如說堯欲讓位于巢由皆假設以誇其髙必得舜之聖方能紹堯之治堯豈無眼睛而欲讓位于巢由乎莊子動輒說箇自然說箇無為夫道理固是自然不用安排不須造作然在人便當窮究玩索以求其所以然操存省察使實有諸己發揮推廣以及于人但不可以私意助長以鑿之若一任沖漠自在更不檢束則道理與我不相管攝其所謂自然乃一切棄去此理而不為非聖人真實懇到出乎本心之自然循乎天理之自然也此莊子所以叛乎道也其曰天地自然無為聖人亦自然無為其說似是而非實不知天地聖人夫天地之道至誠無息春以生之夏以長之秋以遂之冬以成之鼓之以雷霆潤之以風雨明之以日月肅之以霜雪謂之無為可乎但一出于真實之理人莫測其所為也聖人之道純亦不已仁以為愛義以為制禮以為秩智以為鍳感之以德化導之以政教肅之以刑禁謂之無為可乎但一出于至誠之心至實之理行其所無事非有所勉強私意造作謂之自然謂之無為可也非如莊子之棄滅禮法付之自然沖漠虛靜以為無為也釋氏說心只說著一箇意思非是真識此心也釋氏說性只說著一箇人心形氣之私未識性命之正釋氏誤認神識為理故以作用是性殊不知神識是氣之英靈所以妙是理者就以神識為理則不可性是吾身之理作用是吾身之氣認氣為理以形而下者作形而上者釋氏是認精魂為性專一守此以此為超脫輪回陳公甫說物有盡而我無盡亦是此意程子言至忙者無如禪客又言其如負板之蠱如抱石投河朱子謂其只是作弄精神此真見他所造只是如此模樣緣他當初只是去習靜坐屏思慮靜久了精神光彩其中了無一物遂以為真空言道理只有這箇極𤣥極妙天地萬物都是這箇做出來得此則天地萬物雖壞這物事不壞幻身雖亡此不亡所以其妄愈甚釋氏以為吾有真性真身在天地間不生不滅只是人不悟耳曰性豈有真假人豈有二身其曰見性妄也釋氏是羈制其心之法非存心之法儒者只端嚴敬慎每事精察不敢漫為則心自存釋氏則反觀內視使心動不得屏絶思慮使心出不得或算數珠念佛號或視鼻端數息數或屏絶人事面壁端坐或只守一箇念頭再無他念皆是制住此心不使妄動雜思以致虛靜及羈制之久則此心慣熟亦不走作噫心具萬理應萬事反被羈制如此此其所以天理人倫事物滅絶一歸于空寂然心是靈物既不走作以至空寂之久亦有許多聰明光耀出來只是正理滅絶故猖狂顛倒或問今之儒者多入異教何也曰今之儒者多喜𤣥妙愛虛靜貪快樂不曾做博文約禮工夫如何不入去釋氏見道只如漢武帝見李夫人非真見者也釋氏只想像這道理故勞而無功儒者便即事物上去窮究佛學心守向一路去便不去窮䆒天下道理所以其學易成如只守一箇念頭就要做成佛是其道隘而捷其志堅而確其心一而專非若儒者智周萬物道濟天下而心常存也儒者心與理一而存佛學心與理離而存天下古今謬妄以致顛倒錯亂莫甚于佛氏老莊又在其次如以己身為凡身要别尋一箇真身其愚乃至此可哀也又以為先有我然後有性有命其差則一也以其誤認别有一箇真身常在不生不滅之中性命亦由我而後有故性命亦不足惜故肯捨身食虎其意以為既有真身還有一箇真性命所生之身所生性命皆是假底不若捨之以去必尋著那元初真底其謬妄至此亦有其故原其初只是不屑人事而屏絶之以致空虛無事心無存主又無用處雖要無心亦不能無心心無安處故懸空想出這般假物事來反要棄了自己所生真身真性命以就懸空假底不知其假反以為真將見棄了真底假底又就不得哀哉自其說流傳引取了多少好人陷入誤門中去禪學雖似廣大髙妙其實悖􅍝窄隘今日只緣聖學不明許多好人都尊信之所以其風盛禪家存心有兩三樣一是要無心空其心一是羈制其心一是照觀其心儒家則內存誠敬外盡義理而心存故儒者心存萬理森然具備禪家心存而寂滅無理儒者心存而有理禪家心存而無主儒家心存而活異教心存而死然則禪家非是能存其心乃是空其心死其心制其心作弄其心也禪家害道最甚是他做工夫與儒家最相似他坐禪入定工夫與儒家存心工夫相似他們心空與儒家虛心相似他們靜坐與儒家主靜相似他們快樂與儒家悅樂相似他性周法界與儒家萬物一體相似他光明寂照與儒家虛靈知覺相似儒家說從身心上做工夫他亦專要身心上做工夫儒家說誠意他便發誠心故似是而非莫過于禪家所以害道尤甚愚謂儒釋工夫在源頭已不同矣儒者工夫自小學灑掃應對周旋進退詩書禮樂愛親敬長必恭必敬無非存心養性之法非僻之心在這裡已無及長則主敬窮理並進交養戒謹恐懼誠恐一事有差則心無不存理無不在禪家只是默坐誠心絶滅思慮真求空寂空寂之久心能靈通殊不知空寂之中萬理滅絶那些靈通只是自己精神意見全不是道理故他之心已與理二矣既與理二則凡所動作任意為之以為此即是神通妙用不用檢察自然廣大無邊又專一守此以為至𤣥極妙其空豁快樂者以此性周法界者以此光明寂照者以此猖狂自恣者以此背天逆地者以此若儒家存心愈熟則察理愈精久則心與理一動靜語默酬酢舉措無非天理發見流行所以家齊國治天下平天地位萬物育是其功效自然之妙豈禪家顛倒錯亂所能比哉且禪家以作用是性是認氣為理以形而下者作形而上者故滅絶天道亦不自知矣程子言其以管窺天直見北斗處朱子言于天理大本處見得些分數者蓋人之生都是乾道變化各正性命處來人之神識是保合太和裡面底事他在此處窺見些子遂守定此物不令亡失則可以脫輪回再去奪胎出世遂言他别有一箇真身父母所生者只是幻身故不孝父母殊不知乾道變化已在父母身上故氣盛則生子氣衰則子繼生生不窮故此身此理皆是父母所傳若由你這箇真身再去出世則乾道變化箇甚老氏雖背聖人之道未敢侮聖人莊子則侮聖人矣莊子雖侮聖人未敢侮天地釋氏則侮天地矣異端與吾儒初然只爭毫釐其終不啻千萬里蓋在源頭差了末流愈正不得可憐用一生工夫雖要做好人終成大罪人其初只是好髙大喜虛靜不肯斂心俯首從事實上學以致如此異教所謂存心有二也一是照看一心如有一物常在這裡一是屏除思慮絶滅事物使其心空豁無所外交其所謂道亦有二也一是想像摸索此道如一箇物事在前一是以知覺運動為性謂凡所動作無不是道常不能離故猖狂妄行視鼻端白以之調息去疾則可以之存心則全不是久必入異教蓋取在身至近一物以繫其心如反觀內視亦是此法佛家用數珠亦是此法羈制其心不使妄動嗚呼心之神靈足以具衆理應萬事不能敬以存之乃羈于一物之小置之無用之所哀哉聖賢一循乎天理故無繫纍今山林隱士欲脫去塵俗世利以求無纍異端欲屏去人事思慮以求無纍山林隱士雖自遂一偏之髙不足以盡天下之理然未至甚害理其清髙之風猶足以激汚俗異端則天理滅絶顛倒尤甚髙士一變則為異端矣聰明人多為禪學所動設使韓退之不聰明大顛也動他不得人皆闢異端而恐其害道然不知其陷溺之由蓋其初只是清髙隱僻之士好清閒厭世俗之煩雜及其久也清靜寂滅其心無所用故懸空見出許多物事以為道德以為心性以為太極學者須隨時收斂隨事省察方不陷溺若聰明人不去事理上體究只憑自己意見必喜髙妙必至陷溺末世道喪百病俱生邪異蜂起或專于記誦或溺于詞章或汩于功利皆非善學者也此不及者也若好清髙閒散者多流于黃老好髙大寂靜者多入于禪宗此過中者也又豈善學乎禪學人易陷溺者是他做主敬涵養之功不至無以存其心不如索性尋箇閒靜庶不為物誘見聖賢有箇存心工夫遂捉住此心安放在腔子裡及久也常若見此心光爍爍在內自以為真能存心及其遇事所存之心已靠不得應得事來心又失了存得心來事又背了故其顛倒錯亂猖狂自恣豈緣心與事兩不相照是其所存之心不足具衆理又滅衆理不足以應萬事又害萬事故禪學之陋如此殊不知心本在內之物其體足以具衆理其用足以應萬事或為舊習所繞物欲所誘而放也惟戒愼恐懼齊莊恭敬若履淵氷若接賔祭則固已湛然在內天下之理已涵具于其中豈假拘縳捕捉然後入照看繫制而後存哉事物之來此湛然在內之心隨而酬酢之必能精察詳盡各得其理又豈有紛擾錯亂之患哉易所謂敬以直內義以方外中庸所謂大本達道此之謂也然則彼所存之心非心歟抑是心歟謂之不是心亦不可但被他做差了工夫將這心來作弄照看如玩好之物相似所以如此佛學捷徑儒學周遍所謂捷徑者只專守此心便會悟道若悟得萬事皆了不用下學自能上達以為道無不在凡所動作無不是道所以身不用檢心不用察任其自恣儒者則存心以敬又事事精察無遺所以窮理力行之功盡人倫周事物其效則三綱正萬事治今之朋友多入禪學亦勢之必然蓋因小學大學之教不行自幼無根本工夫長又無窮理工夫心要收又難收故厭紛擾喜虗靜又惡思慮之多而遏絶之久則必空所以多流于禪也學老釋者多詐是他在實理上剗斷了不得不詐向日李鑑深不認他是譎吾曰君非要譎是不奈譎何陳公甫云靜中養出端倪又云藏而後發是將此道理來安排作弄都不是順其自然婁克貞說他非陸子之比陸子不窮理他却肯窮理公甫不讀書他勤讀書以愚觀之他亦不是窮理他讀書只是將聖賢言語來護已見未嘗虛心求聖賢指意舍己以從之也見得此心光明亦是佛學之低者若髙底連心都無了今陳公甫已到髙處克貞未到自家大本不立見得道理不分明未有不入異教者如陳公甫婁克貞皆是儒者陷入去故程子曰只因無處撈摸智窮力屈見他有箇寬間意思遂歸之朱子曰只為這裡工夫缺缺奈何心不下故如此程子說冲漠無朕萬象森然已具是說未發之時只是沖漠無朕而已而天下萬物之理已默具于其中公甫說一片虗靈萬象存是要把他底精神來包涵萬象與程子實不同也以程子之說只去莊敬涵養上做工夫而心之本體已立不用察覺安排而道之全體已渾然在中故聖賢氣象深沉篤實光輝自在如公甫之說是常把這天地萬象積放胸中只弄得這些精神豈暇再去思量事物之理故張皇烜赫自己不勝其大故下視聖賢小視天地其曰生不知好死不知惡是他本來面目非心實不然故作此大話頭來嚇人也朱子言能求放心即是仁此言最親切蓋生理渾然具于心謂之仁而心實主統之或心為物欲所誘而逐物于外謂之放則此理無所主統不能具此生理而失之若能存此心不至放逸則身有所主生理自具或曰禪學亦能收放心乃背理如此何也曰聖賢是隨事敬謹以存其心心有主也禪學絶滅物理屏除思慮以謂心存是空其心絶其理內未嘗有主何以具天下之理哉其學亦有數樣有靣壁靜坐絶去人事使心不與物交以謂能存其心者有常常照看一箇心在內裡以為不放者有只守一箇念頭羈制其心使心不能出入以謂存其心者皆非聖賢存心之法或曰思慮者感于事而心出乎外豈非放乎曰思其所當思正所以檢㸃省察其心惕然而在若不思則物交物心為所引其放必矣或曰靜時有思慮乎曰無曰有心乎曰有而未動也曰何謂之有曰操也曰操則動矣可謂之靜乎曰操只是把緊不放縱之謂事物未交思慮未萌不可謂之動曰人操其心乎心自操乎曰心身之主非身外有心人與心不可分為二人操即心操我整齊嚴肅即心整齊嚴肅我主一無適即心主一無適且主一無適即是操非主一無適之外别有所謂操也或曰主一無適用意否曰既曰主一即用意也曰聖人用意否曰聖人自然用意非勉也或曰何以謂之有主曰在內不放即有主也有主則惺惺或曰釋氏何以無主曰釋氏空靜是滅其主矣羈制其心則做主不得照看其心亦擾亂不能為主此儒者之學所以內外一致體用全備釋氏則用絶于外體空于內內外離隔顛亂韓子闢異端手假低是從末上闢孟子程子朱子是從本上說所以非韓子所及今日異端經程朱闢後本不能害人是學者不會做工夫自流入去病在不于小學四書近思録上用功居業録卷七
