body:
  text: 居業録巻八明胡居仁撰經傳第八大學言明徳新民明徳自明其徳也新民推以及民使之自新也故曰先知覺後知自老子有愚民之説秦愚黔首後世一向只是欲愚其民無有能新其民者聖人新民是欲使民明其徳至老氏愚其民欲昏其徳也葢恐其智巧奸偽而難治至秦愚黔首是欲其蠢然無知以聽從於己可以肆其暴今之暴虐不仁者皆欲愚其民義理貫通後此心便有定主不可惑亂故曰知止而后有定理在物上故須格物方窮得理釋氏遺物是懸空求理故只見差去致知在格物從事物上窮究其理便實若只管思索想像便是思而不學則殆人多因不知而敗事故大學先致知知至而不能處事者鮮矣或問存養在致知之先在致知之後曰未知之前非存養則心昏亂義理之本源已喪何以能致知既知之後非存養則亦放逸偷惰天理隨失何以保其知先儒言未知之前非敬無以知旣知之後非敬無以守又曰敬者聖學之所以成始成終者也又問存養屬知屬行曰存養乃知之本行之事此未行之行也心本有知因氣禀物欲昏蔽其良知故須致知顧諟天之明命是事事不違天理顔子非禮勿視聽言動孟子必有事焉是此等工夫顧諟天之明命是操存省察要事事盡理使天賦之理不至昏失豈目常㸔見光光明明乎然則參前倚衡是何物曰此指忠信篤敬而言是人做工夫處常不離乎忠信篤敬則此心常存天之明命無不在矣自新為新民之本未有自新而不能新民者亦未有不自新而能新民者半上落下人難做半夾界事難做故君子無所不用其極為治須要有本末徳具於己人自感化此本也修政立事處置得宜末也本正則末易施末脩則本益厚然末出于本非兩事也曉得道理怕人不實去做故大學致知後便要誠意要做不做此是意不誠是自欺處意者心有專主之謂大學解以為心之所發恐未然葢心之發情也惟朱子訓䝉詩言意乃情專所主時為近窮理后便有才誠意后便有徳心廣體胖誠意之效是天理實有諸中也宰相以不蔽賢不忌功為賢故曰其心休休焉在心無一毫不盡是忠發出在事上無不實便是信利極害亦至故石崇滅身亡家私於己者必害於己與衆同利者利莫大焉古者義利只是一體事義所以為利利即義之所為也故曰以義為利又曰利者義之和也又曰利物足以和義葢以義制事自然順利修於己也心廣體胖推於人也民安物阜利孰大焉如公劉遷邠文王治岐上下莫不殷富曾子曰生財有大道孟子亦曰善政得民財葢分田制井恭儉節用自然上下豐足皆以義為利亦非將義去求利只是義則無不利也以家言之父慈子孝兄友弟恭夫義婦順利孰大焉自小學大學之教不行髙者入空虛卑者入功利自大學格物致知之教不行學者所見淺陋小學是做敬的事敬是大學骨子若無敬一部大學做不成在天曰命在人曰性在物曰理在五常為道其實非有二也然道又通乎天地人而言故曰天道地道人道只是這箇道理更有甚事聖賢隨其所指分别出來貫通後萬物只一理以其流行不息賦與萬物者謂之命萬物各有禀受而此理無不全具謂之性性中生意粹然為衆善之長謂之仁裁度斷制處得其宜乃性之義儀章品節天秩燦然不亂乃性中之禮分别是非條理分明乃性中之智實有此理元無虛假謂之信見于日用各有所當行者謂之道通天地人物莫不各有當然之理總謂之道其所以闔闢天地終始萬物無窮無盡謂之太極無非是這道理道一也所指不同孔子曰一隂一陽之謂道邵子以道為天地之本又以道為太極朱子曰元亨利貞天道之常子思曰率性之謂道然道即理也一隂一陽之謂道形而上者謂之道是指此理行於形氣之中也道為太極為天地之本是指此理為造化之主也率性之謂道是指此理見于人身日用也元亨利貞是指天理之流行而言也工夫本原只在主敬存心上致知力行皆靠住這裡做去道理本原只在天命之謂性上萬事萬物之理皆在此處流出語類云忠是就臣所不足處言之此記者之誤葢忠是臣職當為性分固有若因其不足而聖人設此以救之則是聖人作意安排非率性之謂矣戰戰兢兢是不敢有些子放肆戒謹恐懼是不敢有些子惰慢人常戒謹恐懼則物欲自來不得所以存得天理之本然在古人無時無處不用力無事之時必戒謹恐懼有事之時必精察其是非未發之時事物之理已具但未發耳此時不容求索只敬以自持事物旣接思慮一動則便是已發便當省察然其已發之理便是未發時的理體用本末實一貫涵養得這道理熟發便中節人之學易差羅仲素李延平教學者靜坐中㸔喜怒哀樂未發以前氣象此便差却既是未發如何㸔得只存養便是昔呂與叔蘇季明求中于喜怒哀樂未發之前程子非之朱子以為即已發之際而識其未發之前者則可愚謂若求未發之中㸔未發氣象則動靜乖違反致理勢危急無從容涵養意味故古人于静時只下箇操存涵養字便是静中工夫思索省察是動上工夫然動静二端時節界限甚明工夫所施各有所當不可乖亂混雜所謂動静不失其時其道光明今世又有一等學問言静中不可着箇操字若操時又不是静以何思何慮為主悉屏思慮以為静中工夫只是如此所以流于老佛不知操字是持守之意即静時敬也若無箇操字是中無主悠悠茫茫無所歸着若不外馳定入空無此學所以易差也道理本全具未發時敬以養之莫令有偏也已發時敬以察之莫令有差内外動静交致其功黄勉齋言性雖為氣質所雜然其未發也此心湛然物欲不生氣雖偏而理自正以釋子思未發之中又引朱子未發之前氣不用事為證竊恐誤也夫偏濁之人未發之前已失其中故已發不能和故子思敎人致中和先儒以存養為致中省察為致和不善之人亦有静時然那時物欲固未動然氣已昏心已偏倚理已塞本體已虧故做未發以前工夫須是主敬子思言戒謹恐懼程子言莊整齊肅朱子言端莊静一天人各盡其分而理則自相貫通至天地位萬物育人又做着天三才備而交相為功也今人學不曾到貫通處却言天地萬物本吾一體畧窺見本原就將横䜿放胸中再不去下格物工夫此皆是助長反與理二不若只居敬窮理盡得吾之當為則天地萬物之理即在此葢此理本無二若將天地萬物之理懷放胸中則是安排想像愈不能與道為一如釋氏行住坐卧無不在道愈與道離也中庸可以盡易之理易是君子而時中之道隨時不是隨俗今人錯認以隨俗為隨時古人皆因那時節便做那時事無不當其可如堯舜當那時便揖讓湯武當那時便征伐孔子當周末又傳道垂訓皆隨時非隨俗也泥古則濶于事情徇俗則偏于茍簡二者皆非天理時中程子體道最切如説鳶飛魚躍是見得天地之間無非此理發見充塞若只將此意思想像收放胸中以為無適而非道則流于狂妄反與道二矣故引必有事焉而勿正心勿忘勿助長則吾心常存不容想像安排而道理流行無間矣故同以活潑潑地言之以見天地人物之理本相流通但吾不可以私意撓之也夫婦人倫之首王敎之端人事之至切近者君子之脩身齊家造端乎此故孔子録詩錄正風于始所以勸也又錄變風于終所以戒也存諸中莫若忠施于人莫若恕忠是盡己之事為萬事之根天命之性即此而存天下之大本即此而立恕是推己之事揩磨物欲消除私吝使天理流通物我俱得其所也先儒言無忠做不得恕是先有體而後有用也只正己而已人之從違用舎皆不可必茍以人之從違用舎為累則失其所守必矣謝顯道言鬼神道有便有道無便無世間無這箇活弄的道理有道無不得無道有不得尸居龍見淵黙雷聲此誠不可揜處王道之本歟卲子曰思慮未起鬼神莫知葢思慮未起乃寂然不動萬理咸備之時然此時未有所感鬼神安能知之思慮既發氣便感理便通近而旦夕遠而千萬嵗一思卽在近而目前逺而千萬里一思即到心神感通之妙如此鬼神安得不知鬼神雖知人尚未知葢人之知識雖無不通其接物必由乎耳目事迹未著見聞無所施也人之所接以形鬼神所感以氣人則即其己形而知其未形鬼神則自其未形通乎己形幽明不同其理則一也為政雖使民各得其所物各遂其生方盡為政之道然其本在於得賢才而用之取人以身故脩身又為得賢之本未有身不脩而能任賢才者只從父子君臣夫婦長幼朋友上求道便是眞實底道理學至於誠身便有獲乎上之理只在所遇如何誠字大天理之實人心之實人事之實皆在其中忠信則專指乎人而言所以存乎天理之實故孔門以此為學之本此理貫徹古今無有窮盡在天為天道在人為人道在物為物理學者惟當隨事即物以明其理致其知守於己而勿失謂之忠推於事而曲當謂之恕思其所當思則心亦不放若不當思而思之則此心牽纒擾亂乃所謂放心當思慮亂時惕然自省即自整頓而莊嚴自持則心自湛然在内致曲是事事要必推行到極處旣到極處則誠立矣誠立則不可揜故形著動變自不能已成己者必能成物自治者必能治人先儒言合内外之道又曰表裏交正曰内外交養曰本末相資曰體用一源顯㣲無間曰動静相涵曰敬義夾持此等處最宜理會此處見得破則知所用力知所用力則功利無所誘異端不能惑矣天人之理雖一天人之分則殊故天做天底人做人底各盡其分而吾之理則天之理也故維天之命於穆不已乾道變化各正性命是天做天底聖人之心純亦不已應酬事物各得其所是人做人底夫人即那天命不已乾道變化中來底吾之性即是那各正性命底故天命之性盡在于我無毫髪少欠若存得吾心養得吾性則天命全體渾具于中發而應事各得其所則吾身天道亦流行而無間矣葢天許多道理我盡有之但盡得吾身之理則天道亦盡今不來吾身做工夫只去思想天道愈見二了豈能合天人之理乎故程子曰天人本一言合天人已剩着一箇合字聖人心不離乎理理不離乎心所以純亦不已大賢以下必操存省察乃能不離乎理茍不操存不省察則與理違矣或問聖人心與理一不用操不用省乎曰聖人固不待操而存省而知然亦無不操無不省但聖人心無放逸人不見其操誠明徹照人不見其省所以神妙不測也曰異端亦曰不操而存又曰無適而非道何也曰異端不事其操只要心空無物旣空而無則不用操矣異端未嘗見道只想像箇道無不在以為無適而非道故猖狂妄行常與道離也天地發育萬物是此理之流行聖人應萬事是此理之發用學者當隨事省察處之以理可漸到聖人他位只要熟也人之才氣大者多疎微者又瑣細致廣大又盡精微方是聖賢之學儒者存此心以應物心存則處事當理事得其理則心益存所謂内外一致心迹不分佛氏只去把持一箇心不去應事是絶了心之理當事物之來不得已而應之又要把持照㸔此心在腔子裡是一邊外面應事一邊内裡持心應得外面事不曽存得内裡心存得内裡心又不曽應得外面事此其所以内外判隔顛倒猖狂戒謹恐懼小心翼翼工夫無所用一任狂妄高大凌空駕虛而得罪于聖人也昔王介甫言以高明處己以中庸待人便是内外心迹判為二事處己待人分為二理殊不知所謂髙明者是不為物欲所累不淪没其本心中庸是事得其理無過不及也髙明所以為中庸中庸即髙明之所為豈中庸之外别有一箇髙明將來處己高明之外别有一箇中庸將去待人詩言明哲保身不是趨利避害以保其身若趨利避害以保身非老佛莊列則是奸計小人聖賢道理極明許多事業都在聖賢身上其出來必與天下俱安道不可行事幾亦先見若不識事幾走出犯難身亡俱無所益智計之人多不能保其身者其智易窮也何以易窮以非天地間正理也明哲保身是正理非智計也不愧屋漏雖無一事然萬理森然已具于其中此是體也但未發耳老佛以為空無則本體已絶矣今人只言老佛有體無用吾謂正是其體先絶于内故無用于外也不愧屋漏便能到得不賞而民勸不怒而民威于鈇鉞篤恭而天下平敬只是一箇敬又曰篤敬恭只是一箇恭又曰篤恭是篤實做得有力不走作也君子篤恭而天下平君子修其身而天下治省多少心機省多少計較伯者費多少智計只補得些罅漏奏格無言時靡有争是故君子不賞而民勸不怒而民威于鈇鉞不顯惟徳百辟其刑之是故君子篤恭而天下平易曰盥而不薦有孚顒若下觀而化知此則知無為而天下治霸者之功誠小區區才智不足道感應者為治之本所以能感應者理也無聲無臭也卽所謂一本也故曰聲色之于以化民末也善為治者脩身以化之明善以教之立政以正之制刑以一之感化之機雖在無聲無臭處然政刑禮樂旣具教化愈行學而時習之先要學得眞方可時習時習則無間斷而所學熟矣程子以盡性至命必本于孝弟葢孝弟是性命中事至親至切而要者此處能精察而力行之則性命不外是矣窮神知化由通于禮樂禮樂神化只一理禮樂乃人事顯著者然其中精㣲曲折察而知之神化可契而知之敬只是常常不敢放肆事事不敢輕為忠信則不襍人偽所以為學之本須要理會忠信是何事忠信與誠一也但忠信指人而言誠則合人與理言之主忠信便是實行知識有餘而實行不足無以有諸己天理至實故忠信便存天理人有過貴于能悔悔而不改徒悔而已于己何益改過最難須着實做得操存省察工夫使吾身心謹密放僻之心不生則大本堅固過失隨覺而不行也若欲防患于預須以敬為主不使須臾慢忽又常觀書求義浸灌此心悦懌使過失不萌更妙人作差了事須省察悔悟以速改之不可因循含糊若能省察悔悟以改之則後事尚可少過若不悔改則終身學不長而過失愈多矣先王因天理人情而制禮而禮之行又足以正人情善風俗興教化葢禮樂之體用即聖人之體用聖人之體用即天理之體用朱子曰無思時要不如死灰有思時不要邪吳草廬言三十年前好用功阻學者進路居仁三十後工夫方親切張横渠三十後才遇二程孔子言三十而立則後面工夫更多人有才氣者老而不見用皆汩没萎弱不及少年此無學問充養之功聖賢則老而經厯事多閲理益精操養益熟故孔子示人以四十不惑五十知天命六十耳順非若後人聰明才氣之士老不及少也吳草廬言三十年前好用功亦説殺了惟孔子之言可為萬世法學而不思則罔思而不學則殆是要一邊學一邊思習而察行而著也聖賢待異端極嚴眞如待賊相似孔子曰攻乎異端斯害也已孟子曰能言距楊墨者聖人之徒也程子曰佛氏之言比之楊墨尤為近理故其害為尤甚學者當如滛聲美色以遠之葢異端害道如莠之亂苗其害大而深功利害道如衆草亂苗其害小而淺心不安處便不可行故論語言多見闕殆愼行其餘則寡悔能處貧賤者必能處富貴君臣父子夫婦長幼朋友以至貴賤賢愚皆有一定之分乃天理之當然故曰天叙天秩有一毫不盡處便是不曽盡得天分有一毫背戾處便是逆天至于死生亦天分也不安于死者亦是不安天分故曰没吾寕也當貧賤而貧賤亦天分也故曰不以其道得之不去也人不可徇偏好執己見義之與比曽子當初做工夫全備一底工夫也到貫底工夫也到但未悟耳一是大本曽子平日戰戰兢兢盡其忠誠便是立大本處貫是達道隨事窮理禮記曽子問篇精㣲曲盡便是體用上理會但未知得體用是一原故孔子一喚即悟仁是天地之生理具于人心者故先儒以為本心之全徳葢兼四徳而為萬善之長而統乎萬善者也故孔門之教專在求仁其所以教諸弟子者皆是求仁工夫必至于其心渾然天理無一毫人欲之私乃能當仁之全體故顔子三月不違其餘則日月至焉日月至焉亦是到那境界只是不久也明睿所照作天下事甚容易推測而知便難非與道為一不能樂故曰知之者不如好之者好之者不如樂之者程子曰非樂不足以語君子有期待計功之心皆是私心即害于仁故孔子曰仁者先難而後獲孟子曰必有事焉而勿正董子曰正其誼不謀其利明其道不計其功程子曰以敬直内便不直學計功所學雖是亦私心私心害仁故先難後獲先事後得為仁仁者至公而無私故己欲立而立人己欲達而達人先難後獲上義下利正其誼不謀其利明其道不計其功皆無一毫私意智者雖見得眞識得到未免起些計度故曰利仁義理強窮索便有滯礙須涵泳體騐黙識而心通之有理而后有氣有是理必有是氣有是氣必有是理二之則不是然氣有盡而理無窮理無窮則氣亦生生不息故天地之闔闢萬物之始終寒暑之消長知道者黙而識之今之賢者只任他天資見識作事間有窺測些天理來用只是所見淺終不濟事此由于學不講故也理氣不相離兵以義起則人心自奮氣自壯雖不可全用詭計亦須計出萬全故曰臨事而懼好謀而成周子令程子尋仲尼顔子樂處所樂何事要求見仲尼顔子人欲淨盡天理渾然處故有此樂朱子恐人只去望空尋樂不知天理之實必流于異端故又教以從事愽文約禮之誨以至欲罷不能而竭其才今人不去此處做工夫妄去自己身上尋樂故猖狂不實自號尋樂子者有之今人多談怪異以為有者必流于神怪以為無者只是硬見終不足以解時人之疑故孔子不語怪以此葢天地之間所以為造化者隂陽五行之氣而已其交錯變化有正邪常變易險明暗之不齊正而常易而明者理之正人所共知共由故不以為怪邪變險暗世不常有非理之正人皆驚異故以為怪然聖人教人只在正理上窮究正理旣明不正者可照見縱未能照亦不可先去窮他只守吾正理而已邪終不能勝正今仙家及巫師做把戯者皆有邪道但君子所不當知也内有所得不藉于外故富貴貧賤皆不足以動其心以為君子不欲富貴則逆人情只是以義為主學者于義理見得分明則貧賤富貴撓不得容貎辭氣上做工夫便是實學謹獨是要躬行雖難然當勉若不躬行則無以有諸己言為空言知為空知何學為哉古之君子世無道則隠一則道不可行二則亦所以免禍人之作事只盡箇當然之道有意必固我便是私意只循其當然之理則意必固我之私可脱脱則無累矣窮理不周遍則不能約要故先愽而後約愽是零碎處約是總會處窮理而至融㑹貫通則約矣後世有愽學之士不能造約何也此是愽雜之學非眞能窮理不足貴也近日學者便要尋滋味快活此皆是未學行先學走如何不猖狂顛倒只當去教他窮理力行見理明力行正自有滋味自能快活孔子敎人去愽文便是入滋味處敎人約禮便是入快活處但當先難後獲愽文所以明諸心約禮所以有諸己性情須要養飲酒過醉亦壊性情井泉出而不竭是氣生生貫通而不窮也理不離乎氣即此可覩理之不窮川上之嘆以此見義理不怕見得鈍只怕見得淺雖見得快若不精深亦不濟事故曰參也竟以魯得之是理會得事理徹守得牢固克己又言復禮是從實事上執持使入規矩法度而天理在我非如異端旣得之後空虛無據也此心本與天地萬物同體但為私意所蔽則當致其克復若欲以吾之胸次包括宇宙便成狂妄流于異端顔子克己只就非禮勿視聽言動上做工夫不言氣質之偏物我之私者葢能如是則氣質之偏物我之私不待克之而自無矣論語一日克己復禮天下歸仁焉或問顔子克己復禮于天下人何干而天下皆歸其仁曰此正所以相干也物我一理人己一性葢縁皆自一本中來故血脉相通氣類相應自然而然易曰天下何思何慮天下同歸而殊塗一致而百慮鶴鳴子和皆此意也如此則聖人為治之道可知區區智計之私自不容矣顔子四勿涵養省察工夫都在裏孔子言敬只説出門如見大賔使民如承大祭戒謹恐懼整齊嚴肅主一無適惺惺法収斂身心不容一物俱在内裡聖人言語如此周徧精切敬則心之體立恕則心之用行為仁之功莫切于此古人作事從本上作所以簡要如曰舉直錯諸枉能使枉者直是甚簡要後人作事無本受多少煩苦費盡力作事不得舉爾所知爾所不知人其舎諸聖人舉事動得其要此簡易之道治亂興亡美惡邪正詩備矣學者讀之不知所以為政何歟此記誦詞章之學眞不足謂之學也盜賊之生皆因民無恒産與教化不行而致旣游手無業又無禮義以維持其心至饑寒所逼鮮不為盜故孔子言庶富教世亂而無能守之節固可羞世治而無可行之道尤可恥也齊桓晉文皆以力假仁然齊桓頗近正晉文則全用威力智計其勤王者反致凌逼力戰屈楚不由仗義然則桓公不能王何也曰桓之事雖正意則私只做得到此分際非有聖賢之學怎能成王業訂頑立心便可語王道物我之私旣去則天地之生意在我推而行之將無一物不得其所不然則雖一匡天下不過出于智計之私况禍敗者乎為己只把做自己分内事為其所當為久之只見一箇當然底道理其餘都不見矣學不為己讀萬卷書與己無干為己則皆吾事也此道理見得明便信得篤存之熟行之力方有諸己有所為皆是私意故張敬夫言為己者無所為而為者也朱子深取之論舜無為而治一則徳盛而民化二則得賢才以任衆職自古為治之道不出乎修徳任賢兩事為要忠信篤敬忠信于進徳最力然持養處須用敬也非忠信故不篤篤敬處便是忠信忠信篤敬實孔門第一等工夫非禮勿視聽言動也靠就這裡做去熟處便是仁忠信篤敬則隨動隨静心自存理自明義以制事者義有剛毅果斷之意以之制事則不牽于私意孔子曰見得思義義利不两立見利須思用義以裁制之不然則必牽于私背于理矣朱子曰義如利刀相似遇着事便劈詩雖三百篇然人情之邪正風俗之美惡政事之得失無不備見學者欲擇善而固執之莫切于此故孔子謂何莫學夫詩程子謂學詩使人長一格價心無二用只要所趨正窮理明力行篤則心無所放而仁在其中矣良知良能本于天徳之自然須要養不養則喪滅故古人自幼便教之洒掃應對孝弟恭敬論語集註言忠信本也又曰五者以敬為本又曰恭其本歟皆所以示人用力之方學問根本盡在於此論語之書涵育薰陶是堯舜氣象孟子七篇任道擴充乃湯武氣象也孟子天資本英明剛大他又去集義養氣上做工夫所以才氣愈剛大人之學先在持其志志一則動氣如人昏困是氣昏也若悚然自持則志立而氣自清故持志在敬葢嚴肅之地昏惰不生集義養氣亦由于此清明剛大之氣須要養如何養只是循天理不為物欲所屈便是理不離乎氣氣清明者理亦明氣昏濁者理亦昏氣剛大者承載任荷得道理起氣弱小者便承荷不得氣麄者雖能承載反隔蔽了道理故孟子集義養氣擴前聖所未發程子每稱之天地間正氣須養養只要直直只是義配義與道之氣方是浩然之氣是天地間正氣老佛所養一身之私氣必有事焉此心便無他適乃操存之要窮理之本也事一差心便愧心一愧氣便餒氣一餒道義便虧此是一串事只集義便無此病必有事焉是要無間斷勿㤀勿助之間是本心正處天理妙處人欲凈處人茍能省察使事事合理則學大進矣此即是集義必有事焉是孟子最善做工夫處人無所事則心悠悠蕩蕩無歸着必至外馳程子取以明持敬之道其義尤精孟子雖是説集義亦以見敬為義之體也程子以必有事焉為敬是發明言外意又可見敬是義之骨子非敬無以集義必有事焉即主一無適故程子以為敬也朱子以必有事焉為集義因上文而言敬在義中為本也朱子是本文意程子是言外意孟子知言養氣只是箇知與行致知而至于知止則知言矣力行而至于仰不愧俯不怍則浩然之氣自生言之詖滛邪遁原于心之蔽䧟離窮知言由外以知内也故心學不可不講欲心之正必明理心與理元非二物孔子賢于堯舜以事功言也孟子功不在禹下亦以事功言也愚以為顔曽思孟之功賢于稷契臯䕫程朱之功賢于伊呂孟子以後若非程朱則天下貿貿焉人欲肆天理滅髙者入于老佛卑者趨于功利生民之道息矣天地生人物賴聖人為綜理然後能遂其性得其所聖人理人物又必頼禮樂政教之施然後風化美治功成然則成天下之功者聖人也成聖人之功者禮樂政敎也或曰聖人不得位禮樂政教不可行如何曰此聖人之功所以難成也不得已傳述先王之典而脩明之以垂敎于後世使後世之欲脩己而治人者從此而學焉故聖人代天而理物禮樂政教代聖人而行事經籍代聖人而傳道事雖不同其功一也故曰孔子賢于堯舜孟子之功不在禹下行王道者自脩上要工夫到施為上便不費力伯者雖不用自脩工夫然施為上最費力葢天下人物本同一理我得此理人自感化我以此理處置他自然順而易伯者自身本無此理人不感化假這道理去處事去制伏他用盡智計方做得成故王道簡易伯道﨑嶇學者所宜精擇王道之外無坦途仁義之外無功利王者是行其所無事伯者是有所造為物我一理人之善即己之善舎己從人有何不可人為私意所蔽故偏執己意不能來天下之善孟子言性善是指本原之理而言程子兼清濁美惡二者皆是也論太極本然之理以為生物之主安有不善論動靜隂陽錯綜交運安得不有清濁美惡之殊知孟子之説則知吾性之本善當求復乎此而堯舜可為也知程子之説則知人不善者乃氣質之偏當變惡為美以致克復之功其有功于聖門有功于後學非淺也孟子在本原上㸔故以性為善荀子在情欲上㸔故以性為惡韓子在氣質上㸔故以性有三品楊子見道不明故曰善惡混程朱通兼本原氣稟而言斯為明備性即理也故孟子言性善是也論性不論氣不備故程張兼氣質而言自程子之説出荀楊韓之説不辨而自明故朱子以程子為密孟子在赤子入井時認取眞心推而上之性善可知張思叔因讀孟子志士不忘在溝壑勇士不忘喪其元有所感遂肯發憤葢思叔家貧須如此然後貧賤富貴不足以累其心方立得志住死生重于貧富彼死生且不易其志貧富又何足較哉宜乎思叔有所感動奮發也正道難行如良玉難售大器難用自然之理學者不可以其難行遂變其所守如範我馳驅而不獲詭遇而得禽豈可因範我不獲而詭遇乎然在末世則然遇湯武又何難行哉此理湏從優游涵暢中出來則意味自别即孟子所謂自得之也國必自伐然後人伐之秦坑儒書肆暴虐任趙髙姦邪是自伐也豈楚漢所能伐哉漢親宦官害忠良是自敗也又豈曹操所能簒哉唐之敗也亦以宦官害忠良宋之敗也以小人害君子皆自伐也葢君子退則虐政施人民怨盜賊起兵戈興國亡矣處事之法正己為先順理以行之人之從違不可必也不可趨時好然順理處天且不違況于人乎故行有不得皆反求諸己格君心者須分邪正明義利辨王伯使君心曉然知王道之當行不安于伯功之小庶可與之有為湏頼左右匡弼使君心常存敬畏方可成其徳人君心正自不肯用邪人此為治之大本故曰一正君而國定矣徳化為治之本政事為治之具二者交致而風化盛矣風化盛然後鼔舞羣動薰蒸淪浹仁及一世天下事要心去處身去行然物各付物則無事矣何謂物各付物順理處便是治世以大徳不以小惠事物上皆有理順理而行不容些子計較造作故曰行其所無事順理則智不鑿而萬事治故曰大智必有事焉是指學而言不可有造次終食之離勿正心勿助長是亦行其所無事正與助長即私意造作而有事矣豈順理之謂哉世變難説聖賢多只説得箇大經大法其變易無常處亦説不盡孟子善説世變其曰先聖後聖其揆一也禹稷顔囘易地則皆然觀其説一治一亂處甚好但其説不仁者不可以得天下又説匹夫而得天下徳必若堯舜禹又曰天子薦之三代前是如此三代以後多不如此秦晉隋及五代多以不仁而得天下漢髙帝徳非舜禹亦得天下葢時勢不同事變不一古者諸侯萬國各固其疆守以愛養其百姓必有君臨天下之徳然後能服天下之心必天下共尊然後可得至尊之位茍無其徳則列國諸侯之衆非惟不服且將羣集而伐之故不仁者必不得天下匹夫雖有其徳無天子之薦亦不得天下自戰國以來天下諸侯消㓕將盡七國之中無有能行先王之道者俱以勢力戰伐相為勝負至于併吞之久惟秦最強然徳不足服人天下莫肯帝秦直至六國消㓕已盡秦始為帝秦又視己之徳暴天下未嘗心服若更封建則尾大難掉乃立郡縣更立守令不使世守疆土世君其民而易于制使然郡縣無諸侯封疆之固守令無諸侯世守之權又無君民死社稷之心故秦惡既盈陳渉以匹夫起兵而郡縣遂不能支四方豪傑莫不奮起秦之宗社有必滅之理匹夫固有得天下之勢矣及秦已亡天下英雄雖多然才氣識量無有過于漢髙者則天下之勢固當歸漢故劉季以匹夫而為天子厥後或以戰爭或以簒奪以不仁而得天下以匹夫而為天子亦多雖因聖王不作亦由郡縣勢輕不足以自守也但不仁雖得天下多㓕亡不久故聖人而不得君師之位自孔子始以不仁而得天下自秦始皇始以匹夫而得天下自漢高帝始權與經本非二理權者稱錘之名能知輕重而處不失當經是常法如兩事同至皆當依經而行或不能兼盡必有一輕一重則當從其重者如兩事皆重則當詳審而並處之如夫婦人倫重于告禮如告則得娶得以兩盡是經也告不得娶則廢人倫而重父之過故不告而娶所以從其重者而處不失當豈不是權如堯舜得子賢以繼其位此常道也又使其宗廟享之是兩盡其道然使不肖子居君位必至亡國是誤天下生民而宗廟亦滅故傳位于賢則生民不失所朱均亦無後患是以傳子為輕君天下為重也權所以濟經如一兩是一兩如十兩是十兩不失分銖此正天理之精㣲處非聖賢不能用後世學不及此有以茍且從俗為權者以機變處事為權者故權變權術之學興此是背乎經非所以濟經也天視自我民視天聽自我民聽只是天人一理豈有得了民心天命不歸者天理即在民心上後世為政者反欲愚其民何哉古今説義内者惟程子説得精程子曰處物為義又曰中理在事義在心詳味此言義内之意自見有理必有氣理所以為氣氣乃理之所為生萬物者氣理在其中即為性故説着性便遺不得理與氣但所指不同指其本原所由生之理則有善而無惡故仁義禮智何嘗不善惻隠羞惡之發無徃而不善矣其為不善是物欲害之也孟子主意是如此然物欲如何又害聖賢不得衆人如何動輙便為物欲所害是其氣質不同也故指其本然之理而言則為仁義禮智其善可知指其禀與氣者而言則或清或濁或善或惡不能齊也或問氣何以不齊曰氣常運行交錯無一息之停所以不齊也仁義禮智乃性之在内者是吾固有本然之善非由外鑠惟當存養之令勿喪存養之久則天性自全本心自明古人自小學洒掃應對事親敬長周旋禮樂習為恭敬無非存養之事程子發明一敬字于學者最有力而整齊嚴肅是敬下手處或曰整齊嚴肅是外貌上做工夫主一無適是心地上做工夫曰内外一致未有外面整齊嚴肅而心不整齊嚴肅者未有心主乎一而外貌不整齊嚴肅者但當内外交致其功如顔子之非禮勿視聴言動雖在外即所以養其中葢自中而應乎外外不亂則内自有主内有主則外自整齊此敬之功所以貫内外動靜分而言之則靜為涵養動為省察統而言之則動與靜皆所以存吾心養吾徳也仁者本心之全徳葢心中别無他物只是此一箇生理天地萬物皆不外乎此故孟子曰仁人心也程子曰心如榖種仁則其生之性也故孔門只説為仁便是從心地上做工夫仁民愛物從此流出孟子求放心不是捉得一箇心來存只惕然肅敬心便在此心才私便是放不必逐物馳騖然後為放心一放便是私不待縱情肆欲然後為私這裡最難所以古人戰戰兢兢朱子曰孟子説求放心煞是説得切細㸔又説寛了孔子只説居處恭執事敬與人忠出門如見大賔使民如承大祭能如此則此心不容不存此孟子所以不及孔子愚謂中庸言戒慎恐懼程子言莊整齊肅于此用功心自無走作處惟此可補孟子之不及接孔子之教矣孟子發夜氣之説于學者最有功葢心也理也氣也一也心存則氣清氣清則理明理明則氣益清氣清則心愈存其要在操存省察于旦晝之間不為物慾所汩顔子之非禮勿視聴言動孟子之集義養氣程子之居敬窮理是工夫先立乎其大者便是中有主了今人多惑于怪異是未嘗知性知天夫乾道變化各正性命此外俱是異端他道不必窮也存其心養其性所以事天吾心之理即是天故程子曰言合天人已剩着一合字人之學本於良知良能然全要養養則良知良能日長不養則日消孟子在良知良能上體騐故曰性善荀子在情欲交動處㸔故曰性惡依孟子説則禮樂教化皆吾性中事依荀子説是指氣質物欲為眞性故以禮樂教化為偽為也王道只是公伯道只是私王道一于天理之公一者誠也故其光明正大上下與天地同流而萬物各遂其性伯道假公以濟其私假者偽也費盡智計方能小補于世雖不能無功乃功業之卑者下此則姦雄小人聖人為政感發天下人心同歸于善如天覆地載萬物並育于其間所以其民皥皥伯者之政是用其私意智力假仁義以收人心故其民驩娱然其所感者私而狹所為者險而勞是以功烈之卑孟子言善政得民財是分田制井率天下之民務農重榖以生天下之財而國家亦賴其貢賦非是重斂以得民財又非如王安石用青苗市易以剥取民財大學言生財有大道則財恒足亦此意也人心全是天理才違理心便不安心便愧怍莠之亂苗紫之奪朱皆以其相似而難辨與儒道相似莫如禪學此最害道者後之學者做存心工夫不得其眞者多流于禪所謂髙者入于空虛葢天資高邁者多厭世事之汩冗而樂于靜虛又好竒妙而忽卑近又力去做静中工夫掃除物欲屏絶思慮是在内裡先做空了不覺流于禪學只緣在小學四書近思録不曽實體騐而于窮理工夫不到故如此理無不實心無不正謂之誠故荀子以養心莫善于誠周程譏其不識誠誠如五榖已成果實已熟又焉用養孟子言養心莫善于寡欲無欲即誠也心與理為一也莠之亂苗非老于農事者不能辨異端害道惟老于聖賢者能知論語一書堯舜氣象孟子一書三代氣象學者要得不差須實從小學大學做上去工夫在大學效騐則見于二南程子言論語孟子旣治則六經可不治而明矣誠哉是言也若論文字則論孟與六經文字體靣自殊若論工夫道理則六經道理不出論孟之外六經工夫作用亦不出論孟之外所以學者貴自得也先儒以為推類以通之非也論孟六經之道本一何待推所謂一本天地人物甚事不是一本孟子言知其性則知天伏羲仰觀天俯察地近取諸身逺取諸物参騐錯綜無一毫不合處依此冩竒偶卦畫而天地人物古今事變盡在其中若非一理只此數畫如何便能該盡一各生兩只是隂陽兩端交錯變化自然之妙老氏一生二二生三是何道理隂陽兩端再參得甚物來作三故太極生兩儀兩儀生四象四象生八卦八卦生十六十六生三十二三十二生六十四卦加一倍是邵子之數愚以為隂陽上各生隂陽竒偶上各生竒偶此易之理易之理不出於隂陽諸端變化錯綜生出六十四卦若再錯綜叠上去生得無窮卦出來然只六十四卦足以該盡事理再叠反過乎煩故卦止六十四亦自然之理也若天地生物只是隂陽交變錯綜生千生萬無窮無盡又不可限以數目故曰一隂一陽之謂道隂陽只是一箇消長陽消處即是隂生非是陽去生隂隂消處陽即生非是隂生出陽來隂陽事物到極處便變陽長極了便消消便變隂隂長極了亦消消便變陽亦不是隂變成陽陽變成隂但隂變陽即生陽變隂即生以卦爻言之老變而少不變老陽一變便換出隂來老隂一變即換出陽來凡事物吉㐫治亂皆是如此名之曰易易者變易也隨時變易以從道也是指作易者與用易者言則渉乎人矣若論理則易即道之所為非從道也在天曰元亨利貞在人曰仁義禮智因天人之分而異其名其理則一也元為四徳之首仁為五性之長葢天地間只有這箇生理更有何物元為天之生理仁為人之生理元即仁仁即元天人未嘗二也天地人物皆正理所為着邪妄不得故易多言利貞合正理處則事自治見事皆是正理合正理處人心自服見人心盡是正理張子以太和為道體葢太和是氣萬物所由生故曰保合太和乃利貞所以為是太和者道也就以太和為道體誤矣忠信是進徳之基便是立天下之大本忠信是立誠處所以能進徳也忠信二字最力非禮勿言即是修辭立誠非禮而言即妄也非禮勿言乃立誠也修辭是修省言辭去其非禮者乃立誠也天地萬物一理之所為是理處天地且不能違况於人乎况於鬼神乎敬以直内是無許多雜亂邪念故内直内直誠便存葢人心即有理理本直敬則可以闗防外邪養本性敬以直内是必有事焉而勿正以敬直内是正也助長也故程子曰以敬直内則反不直敬以直内是養得仁義禮智之在内不偏不倚故曰中曰大本義以方外是達得惻隱羞惡辭讓是非之情各得其宜故曰和曰達道直内是内裡正當非僻之干無自入矣方外是外靣處置得當條理分明各有體靣各有凖則移易不得天地萬物只是一箇理順之為難故曰順以動天地如此况建侯行師乎又曰天地以順動故日月不過而四時不忒聖人以順動故刑罰清而民服後世不知窮理以智力為治所以不能大治觀盥而不薦有孚顒若彖傳曰下觀而化發明觀之義最切葢在上者下之觀仰視效上旣能盡觀之義在下者安有不觀仰而化乎必以盥薦為言者人之誠敬於此為至盥而不薦不可以詞害義盥則必薦葢言盥而不薦之時在下者己信而瞻仰之以見觀感之神速故下文言神道設教也奏格無言時靡有爭篤恭而天下平無為而治皆此義也不能謹於始者必當悔於終過此則迷復矣能悔者猶救得一半秦穆公漢武帝是也終迷者秦政項羽是也亡無日矣無妄誠也誠天理之實也聖人只是循其實理之自然無一毫私意造為故出乎實理無妄之外則為過𤯝循此實理無妄而行之則吉無不利不幸而災疾之來亦守此無妄之實理而不足憂卦辭爻辭皆此意學者則當擇善而固執也人只當守定實理實理之外不可再有妄動故曰無妄行有眚無攸利獨立不懼遯世無悶非大過人者不能也此時當如此損上益下曰益損下益上曰損周禮泉府買貨之滯於民者欲有益於民也王安石行市易法青苖錢是欲益上損下也故周公行益道安石行損道天下只是箇公與私義與利而所為所成逈别天地革而四時成與湯武革命皆是至公義所當革如春革冬非春要革冬乃天地之氣自然而然夏革春秋革夏皆然如湯革夏命武革殷命皆是理勢之自然非有心於得天下若有心謀天下便是私而不義湯武只是存天理以治國愛民及徳盛民歸自不容己而桀紂之惡日甚天下之民皆引領望之救己戴之為君湯武亦不得徇私逆理違天拂民而不救也桀紂失君道天命已去湯武盡君道不得不奉天命以伐之旣誅桀紂則天下之人固不肯舎湯武而别求君湯武亦不當舍天下而不為君此如四時之革理勢氣數之自然非有心於革也如秦革周漢革秦唐革隋皆有心謀奪其位非天命所當然或曰周秦隋皆天命已絶何謂不當革曰周秦隋天命雖絶而髙祖太宗亦以私意取之非理勢自然之革况始皇之暴乎必如天地四時之無私乃革道之至也或謂武王伐紂旣無心謀天下當擇商之賢子孫如㣲子箕子者而立為天子自居諸侯之位豈不可乎曰此亦私也夫天下者天下之天下商豈得而專有之若使一家可以專有之則肆淫虐而無害也以理論之當以首出庶物者為君次者為臣下者為民君所以總理民物臣所以分任庶職民則受治而安生若肆暴虐則君道失臣民無主自當歸於有徳况周之徳盛民歸又伐暴救民天下之人豈肯釋周故孔子以天理四時之革同乎湯武之革一循乎理無一毫人欲之私也人性本善循理而行本不難非但自己不難施之於人亦順而治此乾坤簡易之理吉㐫者得失之象也凡天下之事得其理則吉失其理則㐫六十四卦三百八十四爻皆然雖否困蹇剥之時茍處之有道在我亦有吉亨之理如六爻中正者未嘗不吉不中正者未嘗不㓙吉㓙禍福不在此理之外故易可以知吉㓙精氣為物游魂為變此説得人鬼死生最明範圍天地之化而不過曲成萬物而不遺此聖人做天底事鼓萬物而不與聖人同憂天之作用又與聖人不同晝夜者死生之道也晝是息夜是消晝是伸夜是屈晝是始夜是終不是將消者再來做息屈者再來作伸晝則必夜夜則必晝是自然之理昨日晝夜自是昨日底晝夜今日晝夜自是今日底晝夜不是將昨日晝夜來作今日晝夜是昨日晝夜盡了今日晝夜再生造化不窮往者過來者續舊者滅新者生自然而然死生便是此理精氣為物物便生是聚也始也游魂為變物便死是散也終也造化自能聚散自能始終豈將旣往之聚散來作新來之聚散將旣往之始終來作新來之始終如寒來暑往是寒極必暑暑極必寒亦不是將去年寒暑來作今年寒暑是今年新生底寒暑故歸根返元死生輪廻之説是不識造化也一隂一陽之謂道繼之者善成之者性繼那天道便是善成那善便是性以此知性善無疑性惡者蔽於氣也氣從何出亦理之所為故程子又曰善惡皆天理但人自不可流於惡又曰不是善惡在性中相對而生旣曰不可流於惡不是在性中相對而生則元初只是善也朱子曰易有交易變易之義交易者隂陽之相感變易者隂陽之相推相感者固相生相推者亦相生故生生之謂易天地設位而易行乎其中只是敬也敬則扶得道理在善則千里之外應之不善則千里之外違之此可見感應之理如曰不賞而民勸不怒而民威於鈇鉞篤恭而天下平聲色之於以化民末也觀盥而不薦有孚顒若下觀而化也上老老而民興孝上長長而民興弟天下何思何慮天下同歸而殊途一致而百慮虛中無我有感必通誠能動物一日克己復禮天下歸仁焉此明感化之機不動聲氣葢在無聲無臭處其原是一本此無為而天下治其要在謹獨退藏於密只是其心湛然無事而衆理具在也易曰齋戒以神明其徳程子主一無適是齋子思戒愼恐懼是戒合而言之敬也天下之理雖萬殊而實一本皆具于心故感而遂通若原不曾具得此理如何通得一闔一闢謂之變雖變亦是常理故曰中庸太極理也道理最大無以復加故曰太極凡事到理上便是極了再改移不得太是尊大之意極是至當無以加也太極者理也隂陽者氣也動靜者理氣之妙運也有是理必有是氣故有太極便生兩儀有是氣必具是理故兩儀旣判太極即具於其中故曰一物一太極又曰萬物共一太極理是氣之主氣是理之具二者原不相離故曰二之則不是一各生兩一物中便有兩儀是易中自然之數畫卦者因之若天地生物無非兩之所為所生之物其數不拘於此絪縕交錯多寡不齊也朱子謂易為卜筮而作恐不然易是摹寫天地間變化河出圖聖人則之是則其隂陽竒耦之數河圖亦因卜筮而出乎伏羲仰觀天文俯察地理遠取諸物近取諸身參騐得無不是此箇道理故畫出卦畫以示人旣畫之後則隂陽消長吉㓙悔吝無不在其中故因用之以筮占吉㐫形而上者謂之道形而下者謂之器隂陽形而下之器也隂陽之理道也故曰一隂一陽之謂道人之動作威儀形而下者也其理則形而上者聖人制而行之謂之禮施之天下謂之法習矣而不察行之而不著是不能由器以察理故曰終身由之不知其道生物須要隂陽交感乃生或以氣交或以形交天地氤氳萬物化醇是氣交男女搆精萬物化生是形交血氣盛則生子子長則父母衰此即易也變易之大者古人以陽為善隂為惡陽為君子隂為小人此以類而言也若論一隂一陽之謂道豈可以隂為惡以類而言則陽剛健隂柔弱陽清明隂濁暗非善惡而何程子言善惡皆天理非言有不善之天理言善惡皆天理中出來的是理處便是善非理處便是惡葢太極流行便有動静隂陽是非邪正亦是理之自然不能無者非言惡者亦可名為天理也扶陽抑隂雖聖人之用意實天理之當然葢聖人之意即天理所在非如人之私意聖人只是盡其道感化之妙自然而然聖人固欲人之感化亦未嘗有心也故曰同歸殊塗一致百慮只虛中無我而已易之道廣大悉備程子以事理明之朱子又多以象占推之皆可葢一隂一陽之謂道其交錯變化髙下清濁偏正美惡無所不有故六十四卦中象占無不僃事理無不該旣不可專拘於事理亦不可專拘於象占也然事理又切世用立天之道曰隂與陽隂陽氣也理在其中立地之道曰柔與剛剛柔質也因氣以成立人之道曰仁與義仁義理也具于氣質之内三者分殊而理一立人之道曰仁與義人不仁義則人道絶矣今人處事不存天理只用智計便虧却人道一物之中便有兩儀陽中有隂陽隂中亦有隂陽如天本屬陽又曰立天之道曰隂與陽地本屬隂又曰立地之道曰柔與剛豈不是一各含兩之義如邵子加一倍法是易數之本五行雖是五除了土作冲氣又只成四箇四箇又只成兩箇隂陽水是太隂火是太陽木是少陽金是少隂冲氣是隂陽會處會則和矣故土居中天下無一物無隂陽火雖屬陽亦有陽火隂火丙丁是也水雖屬隂亦有陽水隂水壬癸是也餘皆然以動靜言之動屬陽靜屬隂以始終言之始為陽終為隂以先後言之先為陽後為隂以方所言之東為陽西為隂以屈伸言之屈為隂伸為陽大而開闢小而呼吸程子言無無對者相對處便是隂陽只有太極無對太極含得有動靜之理在内中自有對也凡事前一截屬陽後一截屬隂凡物頭屬陽尾屬隂上屬陽下屬隂左屬陽右屬隂窮理盡性以至於命程張所論不同朱子于或問論之詳矣然亦是各據自己分上説程子得之易故其言快張子得之難故其言由經厯次序上説名卦之義與卦之彖辭本難曉然孔子彖傳説得已自分明善讀者沉潛玩味則卦義卦辭皆可得矣程子易傳多主事理朱子本義多主象占然有是事則有是理有是理則有是象有是占亦非有二也若專主本義則似乎太拘必讀程傳方發明得盡以易為卜筮之書固不足以盡易以為非卜筮之書亦不可葢易是精㣲之書造化人事無不在内故以之卜筮則知吉㐫以之處事則無悔吝葢文明始開即生伏羲文字未立先畫卦爻故此書雖聖人所作實則天開觀龍馬負圖可見伏羲仰觀俯察遠取近取圖中竒偶與天地間造化事物無不契合乃畫八卦因而重之足以盡天下古今之變以之卜筮足以知吉㐫葢卜筮事變只一理相通而應無異術故聖人用之卜筮為多孔子發明之後天理人事顯然為學本末廢興存亡進退出處莫不詳盡自程子作傳多歸于人事而天道著明易道至此無餘蘊矣天下之變無窮惟易可以盡之葢易隂陽竒偶變易無窮若天地之闔闢氣運之盛衰日月之更迭寒暑之往來隂陽之消長人物之死生國家之興亡世道之古今其消息盈虛升降屈伸吉㐫消長進退存亡幽明終始善惡邪正皆是此理雖萬變無窮易足以盡之葢易自造化中寫出來故也其餘諸經或因時制作隨時記錄天理人事無不詳盡所以垂世立教無不精切但天下古今之變惟易能盡也本義多本彖傳讀易者當先觀彖辭彖傳次讀程朱傳義以發明之爻亦然程傳又有發明到彖傳爻象外意者學者所當體也文王在羑里演易周公又繫爻辭是欲以此盡天下古今之變以為專為卜筮恐不可卦之六爻以中正為善又必有正應方可有為葢中正則才徳不偏有正應則君臣相遇誠意相孚方可以成天下之治康節言畫前有易此説最精未畫卦之前卦之理已有但非聖人寫不出來禮樂亦然制禮作樂雖出於聖人未制作之前禮樂之理已具特假聖人之手以成如曰天地設位而易行乎其中天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉皆此意也刪後無詩却説不定如有聖王者作其詩固在也觀堯典見得聖人作事只是公天下之心無一毫私意今人有遏去思慮以為心不放者有常拘制㸔住心在這裡以為存者皆非聖賢存心之法所以流於異學聖賢只説戒愼恐懼則心自存何嘗㸔住此心不許他走只整齊嚴肅則心便一何嘗遏絶思慮以求不雜主一只是常要整肅非是尋得箇物事來照管不失堯曰欽明只欽則本心自明亦不是要見得此心光明如一物在此儒釋之分正在此處宜深察明辨也聖人之道大行薰蒸漸染得人皆去為善所謂黎民於變時雍是也君相之職最難者是知人四㐫在堯時堯照見他心術毫髮不隱如共工則曰靜言庸違象共滔天於鯀則曰咈哉方命圯族但當時舜禹稷契等未出鯀之才髙可用故只得用之曰往欽哉戒之甚切馭之甚嚴然亦用之治外事而已不使之預朝政也非聖人不能如此處置非聖人照臨在上亦用四㐫不得如荀彧不識曹操孔明誤信馬謖溫公不知邢恕劉元城不知程子定夫胡文定不知秦檜皆是大本有欠燭理不明故也是以君子大居敬而貴窮理闢四門明四目達四聰此舜為治手段後世所當法也然搜揚賢才而用之則四門闢矣得賢明忠直之士而寄以耳目廣詢博訪以來直言極諫則四聰達四目明矣金人不以布帛換金銀是他有見識皇極訓大中雖不甚害理終不親切惟朱子訓皇為君訓極為至極之義標凖之名然後見人君以一身為天下法王道根本在於此此義至精至切得箕子之旨矣古人做工夫極切實貌曰恭言曰從視曰明聽曰聰思曰睿非禮勿視非禮勿聽非禮勿言非禮勿動敬是箇扶持身心的物事怠惰是箇喪敗身心的物事故曰敬勝怠者吉怠勝敬者滅聖人在上氣勢大風化盛人之善心自長惡心自消觀二南之詩可見詩之所以能興起人心之善者以人情事理所在又有音韻以便人之歌詠吟哦吟咏之久人之心自然歆動和暢他山之石可以攻玉者以其能生吾戒懼之心也戒懼則徳成惰慢則徳喪浮議雖不足惜亦可以恐懼修省是他山之石可以攻玉也冬之夜夏之日百嵗之後歸於其室此人之至情上之人讀是詩亦可知自省矣作事雖要人才然人才一半是天生出來一半是聖人作興出來如伊傅周召是天生出來如曰豈弟君子遐不作人濟濟多士文王以寧是聖人在位作興出來雝雝在宮肅肅在廟不顯亦臨無斁亦保此聖人之敬也詩曰旣破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將見得聖人為國為民之心至誠眞切無一毫自利之心故六軍之士感戴誠服而心化非但勞而不怨又以周公為哀己而為之感謝之無已也有太極便有隂陽有隂陽便有天地有天地便有人物有人物便有性情有性情則形於言語詠歌自不容己此詩之所以作也詩旣作又足以正性情辨得失興教化感人心動天地格鬼神此詩之本末功用也詩之善者讀之此心有所感發興起詩之不善者讀之此心有所懲創羞惡此方謂之善讀詩治世之詩言其君上憫恤之情亂世之詩錄其室家怨思之苦范氏此説甚好元年春王正月此六字聖人書法是如此或孔子所書或舊史所書皆可王字必聖人所加元年者魯君之首年不稱首年初年一年始年而稱元年者元有大始之義古有元祀元日則古人已是如此稱只是一箇理當理處便是聖人書法春王正月程傳僃矣春秋之時王道絶矣聖人作經以明王道王道即天理也因亂世之事裁以天理如當時諸侯不王必書王正月以正之周王不天必書天王以正之此皆立萬世之法不但為當世而作也春秋不與五霸者是他心術不正事事把私心去做那些仁義是假底或曰齊桓晉文若以眞心去行仁義春秋亦與之乎曰他若以眞心行仁義即王道也春秋不必作矣他本無明理正心之學故謂之假仁曰設使聖人為之如何曰聖心正己而物格尊王室正侯度明理義興教化盟以結信先王雖不禁必竟是忠信不足乃如此然必行會同之禮以釋疑崇信猶是去私就公尚可也春秋之時則要質鬼神以行其私又且動輙㰱盟是屢盟長亂非但人情衰薄又䙝慢鬼神故春秋書之以示貶則信義重而王化成矣祭伯來當從程傳當時諸侯不朝王祭伯為王卿士若輔王修徳行政誰敢不庭顧乃自甘衰替下朝諸侯書曰祭伯來茍且無聊甚矣王與祭伯俱失道也程子言諸侯不可越國迎婦止當親迎於館是或一道禮不曾載天子諸侯婚禮無可考孟子亦曰諸侯之禮未嘗學詩曰韓侯迎止於蹶之里似諸侯越國親迎也故文定引以為証平者釋其宿昔怨仇之意聖人非不欲其釋怨欲其結仇也但春秋之時諸侯釋舊憾輸新好皆是私意屑屑非公平正大之體其怨也乃私怨其釋也乃私釋其于處己睦隣皆失其道若一循天理則於人又何怨仇之有不得已而有之亦怨所當怨不待平而吾心未嘗不泰然矣此春秋之意也春秋以正大天理觀之則見王道不行當時諸侯皆是營營於私意或當為而不為或不當為而為之或昏弱而不振或恃强以為暴或怠惰而不知修省或僣逆而無狀聖人之意葢欲一歸天理之正而後已其於天地生物之心保民救時之意生殺與奪之權隱然見於書法之中實為百王經世之大法或者乃欲計區區霸業之盛衰又以姓名日月爵號為誅賞其穿鑿𤨏碎甚矣春秋凡書弑者其罪必誅而不赦也其被弑者昏惑不君可知矣書殺賊者幸其能討賊也不書者罪當國臣子不能討賊也内不書弑者不忍言也不忍言則惡極當誅可見矣此聖人言外意也不地所以著其實之不可揜也賊不討不書葬者罪臣子無為也賊在則喪禮廢而不成𦵏矣此法明則忠孝全人道立紀侯大去其國以非齊之罪恐非伊川之言紀侯㣲弱不能守國固不為無罪然比之昏暴以致滅亡者有間非逼于強暴必不去也則齊襄之惡著矣春秋以受伐受戰者為主故書及以責之夫國必自伐而后人伐之是旣失為國之道矣今又不能持重自守固國保民明辨曲直以却敵人之師乃僥倖一勝而遽與之戰非己亂之道也幸而一勝則結怨生亂不幸而敗則宗社危矣讀春秋使人自然戒懼不敢萌一毫私意讀春秋便見得君是君臣是臣父是父子是子長是長幼是幼夫婦朋友截然分明而各止其所其於天道人事分殊理一無不明僃此聖人手段春秋天理之凖的使孔子得行其道必參酌百王之法大僃典制為萬世凖則道旣不行故寓二百四十二年行事於魯史中乃天理之凖的也春秋乃孔子之行事因當世之事一處置從天理上去堯舜三代之道具見於此其斟酌權衡以定百王之法先儒傳註多穿鑿𤨏細惟孟子程子得其本原大意朱子謂以形而下者説那形而上者去葢孟子程子朱子之學具聖人之全體故深得聖人作用默契聖人心事非若諸儒但推測億度也古今説春秋者惟孟子程子精切湥得聖人作經之意葢其學隣於聖人故能得聖人心事其曰春秋天子之事曰春秋經世之大法古今作傳者亦惟程子第一胡傳雖祖程子不及程子簡當發明有力故春秋當以程傳為主以胡傳及諸儒之説以輔翼之則聖人正大精㣲之意不中不逺矣春秋即人事以明天理用天理以處人事非胸中有王道不能註春秋下此皆杜撰臆度也左氏傳博洽記載當時行事及言論煞有是處其陋處好以成敗禍福論人作春秋傳者不少惟程子傳發明得到胡文定旣學於謝顯道不應不取程子傳而自作傳雖有祖程子者不當不表程子而以為己説也胡氏春秋傳多穿鑿只得他議論發越然𦂳要道理亦不發到記曰君子莊敬日强安肆日偷學者脚歩正在此立程子曰毋不敬可以對越上帝四書六經之理意皆相貫通先聖後聖其揆一也今讀其書不實究其理徒誦其文義則四書六經文字各是一般體靣千頭萬緒雖皓首亦無如之何矣惟察其理而實體之於身則體用一貫又何難哉程子所謂論孟旣治六經可不治而明誠哉言也四書六經之言廣大浩博精密後世無人理會得至程朱方理會得今因程朱之書以理會四書六經如指諸掌只是人不立志不反之於身所以無柰何三皇之書謂之三墳言大道也旣言大道孔子不當刪去孔氏言懼覽者之不一旣言大道豈有不一乎程子言後人稱述當時失其義理者旣失義理周公必不令外史掌之蔡氏謂簡編脫落不可通曉亦不應盡脱落雖或脱落存其明白者亦無害竊意三皇之時風氣初開大中至正之道未盡明或過於渾淪或過於樸素簡静非後世所宜者周公之時禮樂政教方極明僃存之無益後世為害必矣孔子欲為萬世立法故去之程子謂上古雖有文字制立法度為治有跡自堯舜始斯言得之居業錄卷八
