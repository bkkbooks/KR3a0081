body:
  text: 居業錄䟦夫學者將以適於用也自聖學失眞卑者溺於功利髙者涉於𤣥虛其所論著非不侈然仁義性命之談然其行不掩總之無當於用安所稱實學哉國朝理學若河東薛氏餘干胡氏兩先生者剸志聖賢之道粹然一出於正學問宗㫖大較符合説者謂河東致位館閣立朝事業彰明較著餘干一布衣耳終其身讀書講學無所表見於天下天下亦私竊疑之謂漫衍未効孰與功見言信噫是非知先生之學者先生之學身心内外一主於敬自夫婦居室之近以至於應接事物進退古今確然有不可易之見淵然有不可窮之用嘗自勵曰誠敬旣立本心自存力行旣久全體皆仁舉而措之家齊國治聖賢之能事畢矣此實先生身有之故言之親切而有味也堯舜之道巍然煥然不過起於兢業一心謂敬為齋居黙坐有體無用者舛矣葢修己此敬安人安百姓此敬第得時行道則為敬事羣居類聚則為敬業耳藉令畧本體而惟功業之程則九合一匡非不焜燿一時何曾西深鄙之不屑與同日語哉彼其闇於聖賢大學之道即建樹鏗鍧終涉粗迹無標之影無源之流君子何取焉先生敦本尚實誠有用之學與河東易地皆然惜也不獲一試其志誠可悲己居業錄舊有刻嵗久字板漶漫中丞李公學宗正脉以興起斯文為己任於先生之學有深契焉大懼曲學亂眞而是書不傳也以余生近先生之居亟命訂之因求遺本補正遂為完書刻成綴數語於末簡萬厯壬辰鄱陽陳文衡䟦
